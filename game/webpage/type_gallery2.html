      function loadImages(page, max){
             var _data = {
                "projectid":projectid,
                 "groupidx":groupidx,
                "page":page,
                "maxcount":max,
                 "imgfoldername" : imgfoldername
            }
            AJAX_AdmGetGame("getgallerydata", _data, function(res){
                console.log("이미지로드했다. is ",res);
               code = parseInt(res.code);
               if (code == 100) {
                   swiper_wrapper.innerHTML = "";
                   var getdatas = res.message;
                   
                   console.log("getdatas ",getdatas);
                   for(var i = 0 ; i < getdatas.length;i++){
                       var data = getdatas[i];
                       const path = "../school/"+projectid+"/v"+groupidx+"/contentdata/"+imgfoldername+"/"+data.filename;
//                       swiper_wrapper.innerHTML +=  "<div class='swiper-slide'><img src='"+path+"' alt='Image "+i+"'></div>";
                       
                       var div = document.createElement("div");
                       div.className = "swiper-slide";
                       var img = document.createElement("img");
                       img.src = path; 
                       var imgid = "img_gallery_"+i;
                       img.setAttribute("alt", "Image "+i);
                       div.appendChild(img);
                      
                       swiper_wrapper.appendChild(div);
                       if (editmode == 1) {
                            var x_btn = document.createElement("img");
                            x_btn.src = base64_btn_x;
                            x_btn.style.position = "absolute"; // 우측 상단 고정
                            x_btn.style.top = "10px";
                            x_btn.style.right = "10px";
                            x_btn.style.width = "50px";
                            x_btn.style.height = "50px";
                            x_btn.style.cursor = "pointer";
                            x_btn.setAttribute('draggable', 'false');
                            x_btn.title = "현재 이미지 삭제하기";

                            const _data = data;
                            console.log("_data ",_data);
                            x_btn.onclick = function() {
                                deleteImage(_data);
                            };
                            div.appendChild(x_btn);

                            var edit_btn = document.createElement("img");
                            edit_btn.src = base64_btn_edit;
                            edit_btn.style.position = "absolute"; // 우측 상단 고정
                            edit_btn.style.top = "10px";
                            edit_btn.style.right = "70px";
                            edit_btn.style.width = "50px";
                            edit_btn.style.height = "50px";
                            edit_btn.style.cursor = "pointer";
                            edit_btn.setAttribute('draggable', 'false');
                            edit_btn.title = "현재 이미지 변경하기";

                            console.log("_data ",_data);
                            edit_btn.onclick = function() {
                                updateImage(_data,imgid);
                            };
                            div.appendChild(edit_btn);
                        }
                       
                   }

      function init(){
          swiper = new Swiper('.swiper', {
              speed: 500, // 0.5초 애니메이션
              loop: true, // 처음과 끝에서 다시처음반복
              autoplay: {
                delay: 5000, // 5000ms = 5초마다 슬라이드
                disableOnInteraction: false, // 유저 상호작용 후에도 자동재생 유지
              },
              navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
              },
              // 터치 슬라이드 기본 활성화
            });
      }
      function addImage() {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.style.display = 'none';

            input.onchange = function () {
                let file = input.files[0];
                if (!file) return;

                const _data = {
                    "projectid": projectid,
                     "groupidx": groupidx,
                    "listnameid": listid,
                    "imgfoldername" : imgfoldername
                };
                uploadFormProcess("../../ssapi/adm_game.php","insertgalleryimage",_data,null,null,input,function(res){
                    console.log("res",res);
                    if (res == "success") {
                        console.log("갤러리이미지 추가 성공!!");
                        reloadPage();
                    }
                }); 
            };

            document.body.appendChild(input);
            input.click();
            document.body.removeChild(input);
        }
        
        function updateImage(imagedata, imgid) {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.style.display = 'none';

            input.onchange = function () {
                let file = input.files[0];
                if (!file) return;

                const _data = {
                    "projectid": projectid,
                    "groupidx": groupidx,
                    "listnameid": listid,
                    "filename" : imagedata.filename,
                    "imgfoldername" : imgfoldername
                };
                uploadFormProcess("../../ssapi/adm_game.php","updategalleryimage",_data,null,null,input,function(res){
                    console.log("res",res);
                    if (res == "success") {
                        console.log("갤러리이미지 업데이트 성공!!");

        function deleteImage(imagedata){
            console.log("deleteImage ");
            C_showConfirmPopup({
                message: `"${imagedata.filename}" 를 삭제하시겠습니까?`,
                onConfirm: () => deleteImageData(imagedata, "delete")
            });
        }
        function deleteImageData(imagedata , type){
            const _data = {
                "projectid": projectid,
                "groupidx": groupidx,
                "listnameid": listid,
                "imagedata": imagedata,
                "type": type,
                "imgfoldername" : imgfoldername
            };
            AJAX_AdmGetGame("deletegalleryimage", _data, function (res) {
                console.log("getgallerydata res is ", res);
                const code = parseInt(res.code);
                if (code === 100) {
                    reloadPage();
                    
                } else {
                    alert("데이터를 불러오지 못했습니다.");
                }
            });
        }
