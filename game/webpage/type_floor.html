    <style>
        body {
            background-color: #fff;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }
        #div_list {
            padding: 20px;
            min-height: calc(100vh - 210px);
            box-sizing: border-box;
        }
        .list-item {
            padding: 15px 20px;
            margin-bottom: 10px;
            background: #f7f7f7;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .list-item:hover {
            background-color: #e0f7fa;
        }
        #bottomBar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #fff;      /* 바탕을 흰색으로 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;                 /* 글자를 검정색으로 */
            border-top: 1px solid #ddd;  /* 얇은 구분선 추가 (선택) */
            z-index: 9999;
        }

        .page-button {
            background: none;
            border: none;
            color: #000;                 /* 기본 글자 검정 */
            font-size: 18px;
            margin: 0 5px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.2s, color 0.2s;
        }

        .page-button:hover {
            background: #f0f0f0;         /* 호버 시 연한 회색 */
        }

        .page-button.active {
            background: #000;            /* 활성 페이지는 검정 배경 */
            color: #fff;                 /* 활성 페이지 글자는 흰색 */
        }

        .list-table th, .list-table td {
            border-bottom: 1px solid #e0e0e0;
        }

        .list-table tr:hover {
            background-color: #f9f9f9;
        }
    </style>
</head>
