        //pdf_manageid 기준으로 그룹핑하는 기본 함수
        function groupRowsByManageId(rows) {
            var grouped = {};

            if (!Array.isArray(rows)) return grouped;

            for (var i = 0; i < rows.length; i++) {
                var key = rows[i]["pdf_manageid"];

                if (!grouped[key]) {
                    grouped[key] = [];
                }

                grouped[key].push(rows[i]);
            }

            return grouped;
        }
        
        //그룹핑된 데이터를 다시 “배열 형태”로 쓰고 싶을 때
        function groupRowsByManageIdToArray(rows) {
            var map = groupRowsByManageId(rows);
            var result = [];

            for (var key in map) {
                result.push({
                    pdf_manageid: key,
                    items: map[key]
                });
            }

            return result;
        }

        function showPdf(path, _width, _height) {
            if (!path) return;

            var width  = _width ? _width : 1200;
            var height = _height ? _height : 900;
            var left   = (screen.width  - width)  / 2;
            var top    = (screen.height - height) / 2;

            var win = window.open(
                path,
                "_blank",
                `width=${width},height=${height},left=${left},top=${top},scrollbars=yes,resizable=yes`
            );

            if (!win) {
                alert("팝업 차단을 해제해야 PDF를 열 수 있습니다.");
            }
        }

        function Default_clickAddFile(idx){
            let input = document.createElement("input");
            var label_pdf_filename = document.getElementById("label_pdf_filename"+idx);
            input.type = "file";
            input.accept = "application/pdf";
            input.onchange = function (event) {
                add_default_file = event.target.files[0];                
                if (add_default_file) {
                    add_default_files[idx] = (add_default_file);
                    label_pdf_filename.innerHTML = add_default_file.name.length < 11 ? add_default_file.name : add_default_file.name.substr(0,10)+"...";
                }                
            };
            input.click();
        }
        function Default_sendPDF(overlay, _data, isupdate, callback) {
          
           
            const formData = new FormData();
            var fileProgress = document.getElementById("fileProgress");
            var progressBar = document.getElementById("progressBar");
            var FILE_UPLOAD_PLACE = "../../ssapi/adm_game.php"; 
           
            var apitype = isupdate ? "sendupdatepdf" : "senddefaultpdf";

            // 파일데이터 : 모든 파일 가능
            if(add_default_files.length > 0){
                for (var i = 0; i < add_default_files.length; i++) 
                    formData.append("files[]", add_default_files[i]); //  각 파일을 'files[]' 키로 추가               
            }
            // 도메인 주소 : 해당 도메인 이외 다른 도메인 접근 불가
            formData.append('domain', window.location.hostname); // 도메인주소  
            formData.append('value', JSON.stringify(_data) );
            formData.append('type', apitype );
            
            // Show progress bar
            if(fileProgress)fileProgress.style.display = "block";
            if(progressBar)progressBar.style.width = "0%";

            // Simulate progress using XMLHttpRequest for detailed progress updates
            const xhr = new XMLHttpRequest();
            xhr.open("POST", FILE_UPLOAD_PLACE, true);

            xhr.upload.onprogress = function (event) {
                if (event.lengthComputable) {
                    const percentComplete = Math.round((event.loaded / event.total) * 100);
                    if(progressBar)progressBar.style.width = percentComplete + "%";
                }
            };
            // Set up event listeners for the XMLHttpRequest
            xhr.onreadystatechange = function () {
                if (xhr.readyState === XMLHttpRequest.DONE) {
                    if (xhr.status === 200) {
                        var res = JSON.parse(xhr.response);
                        if(res.code == "100"){
                             callback(res.message);
                            alertMsg("PDF 데이터 저장 완료! ",function(){
                                overlay.remove();
                            });
                        }else{
                             alertMsg("PDF 데이터 저장 실패!! "+res.message);
                            
                        }
                    }else{
                       
                        alertMsg("데이터 저장 실패!!");
                    }
                    
                } 
                
            };


            xhr.onerror = function () {
                console.error("Upload error.");
                if(progressBar)progressBar.style.width = "0%";
            };

            xhr.send(formData);
        }

                boxShadow: '0 4px 4px rgba(0,0,0,0.3)',
                textAlign: 'center',
               maxWidth:"1080px"
                
            });

            const text = document.createElement('div');
            text.innerHTML = message;
            Object.assign(text.style, {
                marginBottom: '20px',
                fontSize: '16px',
                color: '#333'
            });

            const btnWrapper = document.createElement('div');
            Object.assign(btnWrapper.style, {
                display: 'flex',
                justifyContent: 'flex-end',
                gap: '5px'
            });

            const cancelBtn = document.createElement('button');
            cancelBtn.innerText = '취소';
            cancelBtn.onclick = () => overlay.remove();

            const deleteBtn = document.createElement('button');
            deleteBtn.innerText = okTxt;
            deleteBtn.style.backgroundColor = '#dc3545';
            deleteBtn.style.color = '#fff';
            deleteBtn.onclick = () => {
                if(isCallbackOverlay){
                    onConfirm(overlay);
                    
                }else {
                    onConfirm();
                    overlay.remove();    
                }
                
            };

            [cancelBtn, deleteBtn].forEach(btn => {
                Object.assign(btn.style, {
                    padding: '8px 16px',
                    border: 'none',
                    borderRadius: '4px',
                    cursor: 'pointer'
                });
            });

            btnWrapper.appendChild(cancelBtn);
            btnWrapper.appendChild(deleteBtn);
            box.appendChild(text);
            box.appendChild(btnWrapper);
            overlay.appendChild(box);
            document.body.appendChild(overlay);
        }

     


    </script>
</body>

</html>
