<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스티커 설문 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 w-screen h-screen flex items-center justify-center">

  <!-- 🎛️ 관리자 설문 생성 화면 -->
  <section class="bg-white w-[720px] p-10 rounded-xl shadow-xl">
    <h2 class="text-3xl font-bold mb-6">🛠 설문 생성</h2>

    <label class="block text-lg font-semibold mb-1">설문 제목</label>
    <input type="text" class="w-full p-3 border rounded-lg mb-5 text-lg" placeholder="예: 가장 좋아하는 급식 메뉴는?" />

    <label class="block text-lg font-semibold mb-2">항목 입력 (최대 4개)</label>
    <div class="space-y-2 mb-5">
      <input type="text" class="w-full p-3 border rounded-lg" placeholder="항목 1" />
      <input type="text" class="w-full p-3 border rounded-lg" placeholder="항목 2" />
      <input type="text" class="w-full p-3 border rounded-lg" placeholder="항목 3 (선택)" />
      <input type="text" class="w-full p-3 border rounded-lg" placeholder="항목 4 (선택)" />
    </div>

    <label class="block text-lg font-semibold mb-2">설문 기간</label>
    <div class="flex gap-4 mb-5">
      <input type="date" class="w-1/2 p-3 border rounded-lg" />
      <input type="date" class="w-1/2 p-3 border rounded-lg" />
    </div>

    <label class="block text-lg font-semibold mb-2">설문 결과 공개 여부</label>
    <select class="w-full p-3 border rounded-lg mb-5 text-lg">
      <option>공개</option>
      <option>비공개</option>
    </select>

    <label class="inline-flex items-center text-lg mb-6">
      <input type="checkbox" class="mr-2"> 키오스크에 표시함
    </label>

    <button class="w-full bg-blue-600 text-white text-xl font-semibold p-4 rounded-lg">설문 저장</button>
  </section>

</body>
</html>
