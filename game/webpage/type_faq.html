<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카탈로그</title>
    <link href="./libs/swiper/swiper-bundle.min.css" rel="stylesheet">
    <script src="./libs/swiper/swiper-bundle.min.js"></script>
    <script src="./libs/jquery/jquery-3.5.1.min.js"></script>
    <script src="./js/scripts.js"></script>
    

    
    
    <style>
        body {
            background-color: #fff;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }
        #div_list {
            padding: 20px;
            min-height: calc(100vh - 210px);
            box-sizing: border-box;
        }
        .list-item {
            padding: 15px 20px;
            margin-bottom: 10px;
            background: #f7f7f7;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .list-item:hover {
            background-color: #e0f7fa;
        }
        #bottomBar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #fff;      /* 바탕을 흰색으로 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;                 /* 글자를 검정색으로 */
            border-top: 1px solid #ddd;  /* 얇은 구분선 추가 (선택) */
            z-index: 9999;
        }

        .page-button {
            background: none;
            border: none;
            color: #000;                 /* 기본 글자 검정 */
            font-size: 18px;
            margin: 0 5px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.2s, color 0.2s;
        }

        .page-button:hover {
            background: #f0f0f0;         /* 호버 시 연한 회색 */
        }

        .page-button.active {
            background: #000;            /* 활성 페이지는 검정 배경 */
            color: #fff;                 /* 활성 페이지 글자는 흰색 */
        }

        .list-table th, .list-table td {
            border-bottom: 1px solid #e0e0e0;
        }

        .list-table tr:hover {
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>

    <div id="div_list"></div>

    <div id="bottomBar"></div>

    <script>
        var alllist = [];
        var projectid = getParam("projectid") ? getParam("projectid") : "sample";  //프로젝트 아이디
        var groupidx = getParam("groupidx") ? getParam("groupidx") : 0;  //그룹idx
        var listid = getParam("listid") ? getParam("listid") : 0;  //게시판 아이디
        var editmode = getParam("editmode") ? getParam("editmode") : 0;  //수정모드
        
        //수정모드가 1일때 
        var ishideadd = getParam("ishideadd") ? getParam("ishideadd") : 0;  //버튼 Add 숨기기 : 1 , 보여주기 :0
        var ishidedelete = getParam("ishidedelete") ? getParam("ishidedelete") : 0;  //버튼 Delete 숨기기 : 1 , 보여주기 :0
        var ishideedit = getParam("ishideedit") ? getParam("ishideedit") : 0;  //버튼 Edit 숨기기 : 1 , 보여주기 :0
        var now_pagenum = 0;
      
        let currentListMax    = 200;
        let currentListId     = '';
        let currentProjectId  = '';

        function getPage(pagenum, list_length, list_name_id, projectid) {
              currentListMax   = list_length;
            currentListId    = list_name_id;
            currentProjectId = projectid;
            now_pagenum = pagenum;
            const _data = {
                "projectid": projectid,
                "groupidx":groupidx,
                "listnameid": list_name_id,
                "pagenum": pagenum,
                "listmax": list_length//
            };
            AJAX_AdmGetGame("getlistdata", _data, function (res) {
                console.log("getgallerydata res is ", res);
                const code = parseInt(res.code);
                if (code === 100) {
                    alllist = res.list;
                   
                    if(editmode == 1)
                        updateList(res);
                    else{
                        insertQues(document.getElementById('div_list'), res.list);
                    } 
                        
                    
                    
                } else {
                    alert("데이터를 불러오지 못했습니다.");
                }
            });
        }

           // var div_home_question = document.getElementById("div_home_question");


//                var ques_datas = [
//                    {"title":"Q. 바디패스는 어떤 서비스인가요?", "message": "A: 헬스장, PT샵, 필라테스샵, 요가원, 크로스핏, 골프 등과 같은 스포츠 센터에서 사용하는<br> 회원관리 프로그램(CRM)입니다. <br>수업 예약관리와 매출관리는 물론 무료푸쉬알림서비스, SMS 서비스 등을 제공합니다."},

//                ];

            console.log("ques_datas",ques_datas);

            for(var i = 0 ; i < ques_datas.length; i++){

                console.log(i+" ques_datas[i].lt_message "+ques_datas[i].lt_message);
                var question_tag = 
                    "<div align='left' style='width:100%;border-bottom:1px solid #e4e6ef;'>" +
                        //상단 보이는 부분
                        "<div id='couponlist_header__" + i + "'  style='width:100%;height:80px;background-color:white;'>" +

                            "<div onclick='questionlistClick(" + i + ", \"ques\")' style='position:absolute;width:100%;height:80px;float:left;cursor:pointer;padding-top:20px'>" +
                            "<span style='margin-left:20px;'>" +
                                "<label style='font-size:32px;margin-top:-8px;font-weight:bold;color:#3f4254'>"+ques_datas[i].lt_title+"</label>"+
                            "</span></div>" +
                            // 위아래 화살표
                            "<div id='div_question_updown_ques_" + i + "' onclick='questionlistClick(" + i + ", \"ques\")' align='center' style='float:right;width:40px;height:40px;color:#a1a5b7;padding-top:20px;cursor:pointer' onclick='questionlistClick(" + i + ", \"ques\")' >"+
                                "<i class='fa-solid fa-angle-down'></i>"+
                            "</div>" +

                                //right_btn_tag+
                        "</div>" +
                        //펼쳤을때 보이는 부분
                        "<ul class='csub_ques_" + i + "' style='display:none;'>" +
                            "<div id='couponlist_main__" + i + "' style='width:100%;' onclick='questionlistClick(" + i + ", \"ques\")' >" +
                                 "<br><br><label style='font-size:30px;color:#3f4254'>"+ques_datas[i].lt_message+"</label><br><br><br>"+

        }
        var before_index =  -1;
        function questionlistClick(index,type) {
            var div_beforecouponicon_updown = document.getElementById("div_question_updown_"+type);
            



            if ($(".csub_"+type+"_" + index).is(":visible")) {
                $(".csub_"+type+"_" + index).slideUp(100);
                before_index = -1;
                
            } else {
                $(".csub_"+type+"_" + index).slideDown(150);
            
                before_index = index;
            }

        }
        function updateList(res) {
            const list        = res.list       || [];
            const totalPage   = res.totalPage  || 1;
            const currentPage = res.currentPage|| 1;
            const listMax     = currentListMax;
            const listContainer = document.getElementById('div_list');
            const bottomBar     = document.getElementById('bottomBar');

            // 1) 목록 초기화
            listContainer.innerHTML = '';

            // 2) 테이블 생성
            const table = document.createElement('table');
            table.className = 'list-table';
            table.style.width = '100%';
            table.style.borderCollapse = 'collapse';

            // 3) 헤더 생성
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');

            var headers = listid == "reservation" ?  [
                { text: '순번', width: '10%' },
                { text: '제목', width: '30%' },
                { text: '부제목', width: '20%' },
                { text: '시작일,종료일', width: '20%' },
                { text: '등록일', width: '20%' }
            ]: [
                { text: '순번', width: '10%' },
                { text: '제목', width: '70%' },
                { text: '등록일', width: '20%' }
            ];
            
            var addbtn_tag = editmode == 1 && ishideadd == 0 ? "<button style='font-size:12px;padding:5px 15px 7px 15px;float:right;border:0;border-radius:5px;color:white;background-color:#009ef7' onclick='addData()'>+새글작성</button>" : "";
            if(editmode == 1){
                headers = listid == "reservation" ?  [
                    { text: '순번', width: '10%' },
                    { text: '제목', width: '20%' },
                    { text: '부제목', width: '20%' },
                    { text: '시작일,종료일', width: '20%' },
                    { text: '등록일', width: '20%' },
                    { text: "버튼&nbsp;&nbsp;"+addbtn_tag, width: '10%'}
                ] : [
                    { text: '순번', width: '10%' },
                    { text: '제목', width: '50%' },
                    { text: '등록일', width: '20%' },
                    { text: "버튼&nbsp;&nbsp;"+addbtn_tag, width: '20%'}
                ];                
            }
            
            headers.forEach(h => {
                const th = document.createElement('th');
                th.innerHTML = h.text;
                th.style.width = h.width;
                th.style.borderBottom = '1px solid #ccc';
                th.style.textAlign = 'left';
                th.style.padding = '8px';
                headerRow.appendChild(th);
            });

            thead.appendChild(headerRow);
            table.appendChild(thead);

            // 4) 본문 추가
            const tbody = document.createElement('tbody');
            const baseIndex = (currentPage - 1) * listMax;

            list.forEach((item, idx) => {
                const row = document.createElement('tr');
                row.className = 'list-row';
                row.style.cursor = 'pointer';
                if(editmode == 0)row.onclick = () => showMessagePopup(item.lt_title, item.lt_subtitle, item.lt_startdate, item.lt_enddate, item.lt_message);

                const numberCell = document.createElement('td');
                numberCell.innerText = baseIndex + idx + 1;
                numberCell.style.padding = '8px';

                const titleCell = document.createElement('td');
                titleCell.innerText = item.lt_title || '제목 없음';
                titleCell.style.padding = '8px';
                
                const subTitleCell = document.createElement('td');
                subTitleCell.innerText = item.lt_subtitle || '부제목없음';
                subTitleCell.style.padding = '8px';

                const StartEndTimeCell = document.createElement('td');
                StartEndTimeCell.innerText = item.lt_startdate.substr(0,13)+" ~ "+item.lt_enddate.substr(0,13) || '기간 없음';
                StartEndTimeCell.style.padding = '8px';
                
                
                const dateCell = document.createElement('td');
                dateCell.innerText = item.lt_date || '';
                dateCell.style.padding = '8px';
                
                
                row.appendChild(numberCell);
                row.appendChild(titleCell);
                 if(listid == "reservation"){
                     
                     row.appendChild(subTitleCell);
                     row.appendChild(StartEndTimeCell);
                }
                row.appendChild(dateCell);
                
                if(editmode == 1){
                    numberCell.onclick = () => showMessagePopup(item.lt_title, item.lt_subtitle,item.lt_startdate, item.lt_enddate, item.lt_message);
                    titleCell.onclick = () => showMessagePopup(item.lt_title, item.lt_subtitle,item.lt_startdate, item.lt_enddate, item.lt_message);
                    if(listid == "reservation"){
                        subTitleCell.onclick = () => showMessagePopup(item.lt_title, item.lt_subtitle,item.lt_startdate, item.lt_enddate, item.lt_message);
                        StartEndTimeCell.onclick = () => showMessagePopup(item.lt_title, item.lt_subtitle,item.lt_startdate, item.lt_enddate, item.lt_message);
                     }
                    dateCell.onclick = () => showMessagePopup(iitem.lt_title, item.lt_subtitle,item.lt_startdate, item.lt_enddate, item.lt_message);
                                                            
                    var btn_edit = document.createElement("button");
                    btn_edit.style = "border:0;border-radius:5px;color:#fff;background-color:#009ef7;margin-right:20px;width:70px;height:30px";
                    btn_edit.innerText="수정";
                    btn_edit.onclick = function(){
                        editData(item.lt_idx, item.lt_title, item.lt_subtitle, item.lt_startdate, item.lt_enddate, item.lt_message);
                    }
                    var btn_delete = document.createElement("button");
                    btn_delete.style = "border:0;border-radius:5px;color:#fff;background-color:#af4254;width:70px;height:30px";
                    btn_delete.innerText="삭제";
                    btn_delete.onclick = function(){
                        deleteData(item.lt_idx, item.lt_title, item.lt_subtitle, item.lt_startdate, item.lt_enddate, item.lt_message);
                    }
                    
                    const btnCell = document.createElement('td');
                    if(editmode == 1 && ishideedit == 0)btnCell.appendChild(btn_edit);
                    if(editmode == 1 && ishidedelete == 0)btnCell.appendChild(btn_delete);
                    
                    btnCell.style.padding = '8px';
                    row.appendChild(btnCell);
                }
                
                tbody.appendChild(row);
            });

            table.appendChild(tbody);
            listContainer.appendChild(table);

            // 5) 페이지 네비게이션 생성
            bottomBar.innerHTML = '';

            const makeButton = (text, page, isActive = false) => {
                const btn = document.createElement('button');
                btn.className = 'page-button' + (isActive ? ' active' : '');
                btn.innerText = text;
                btn.onclick = () => getPage(page, listMax, currentListId, currentProjectId);
                return btn;
            };

            bottomBar.appendChild(makeButton('<<', Math.max(1, currentPage - 1)));
            for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPage, currentPage + 2); i++) {
                bottomBar.appendChild(makeButton(i, i, i === currentPage));
            }
            bottomBar.appendChild(makeButton('>>', Math.min(totalPage, currentPage + 1)));
        }
        function addData() {
            showEditorPopup({
                title: "데이터 추가",
                lt_idx: "",
                lt_title: "",
                lt_subtitle:"",
                lt_startdate:"",
                lt_enddate:"",
                lt_message: "",
                type: "add"
            });
        }

        function editData(lt_idx, lt_title,  lt_subtitle,  lt_startdate,  lt_enddate, lt_message) {
            
            showEditorPopup({
                title: "데이터 수정",
                lt_idx,
                lt_title,
                lt_subtitle,
                lt_startdate,
                lt_enddate,
                lt_message,
                type: "edit"
            });
        }

        function deleteData(lt_idx, lt_title,  lt_subtitle,  lt_startdate,  lt_enddate, lt_message) {
            C_showConfirmPopup({
                message: `"${lt_title}" 를 삭제하시겠습니까?`,
                onConfirm: () => updateData(lt_idx, lt_title,  lt_subtitle,  lt_startdate,  lt_enddate, lt_message, "delete")
            });
        }
        function showEditorPopup({ title, lt_idx, lt_title, lt_subtitle, lt_startdate, lt_enddate, lt_message, type }) {
            const existing = document.getElementById('popupOverlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.id = 'popupOverlay';
            Object.assign(overlay.style, {
                position: 'fixed',
                top: 0, left: 0, right: 0, bottom: 0,
                backgroundColor: 'rgba(0,0,0,0.5)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                zIndex: 10000
            });

            const box = document.createElement('div');
            Object.assign(box.style, {
                width: '80%',
                height: '80%',
                backgroundColor: '#fff',
                borderRadius: '8px',
                boxShadow: '0 4px 10px rgba(0,0,0,0.3)',
                display: 'flex',
                flexDirection: 'column',
                overflow: 'hidden'
            });

            // Header
            const header = document.createElement('div');
            header.innerText = title;
            Object.assign(header.style, {
                padding: '15px 20px',
                backgroundColor: '#f9f9f9',
                fontWeight: 'bold',
                borderBottom: '1px solid #eee'
            });

            // Content
            const content = document.createElement('div');
            Object.assign(content.style, {
                padding: '20px',
                display: 'flex',
                flexDirection: 'column',
                flexGrow: 1,
                overflow: 'auto',
                gap: '15px'
            });

            const inputTitle = document.createElement('input');
            inputTitle.type = 'text';
            inputTitle.placeholder = '제목을 입력하세요';
            inputTitle.value = lt_title;
            Object.assign(inputTitle.style, {
                padding: '10px',
                fontSize: '16px',
                width: '100%',
                boxSizing: 'border-box'
            });

            const inputSubTitle = document.createElement('input');
            inputSubTitle.type = 'text';
            inputSubTitle.placeholder = '부제목을 입력하세요';
            inputSubTitle.value = lt_subtitle;
            Object.assign(inputSubTitle.style, {
                padding: '10px',
                fontSize: '16px',
                width: '100%',
                boxSizing: 'border-box'
            });

            const inputStarttime = document.createElement('input');
            inputStarttime.type = 'datetime-local';
            inputStarttime.value = lt_startdate;
            Object.assign(inputStarttime.style, {
                padding: '10px',
                fontSize: '16px',
                width: '300px',
                boxSizing: 'border-box'
            });

            const inputEndtime = document.createElement('input');
            inputEndtime.type = 'datetime-local';
             inputEndtime.value = lt_enddate;
            Object.assign(inputEndtime.style, {
                padding: '10px',
                fontSize: '16px',
                width: '300px',
                boxSizing: 'border-box'
            });

            
            const inputMessage = document.createElement('div');
            inputMessage.contentEditable = true;
            inputMessage.innerHTML = lt_message;
            Object.assign(inputMessage.style, {
                padding: '10px',
                fontSize: '14px',
                minHeight: '150px',
                border: '1px solid #ddd',
                borderRadius: '4px',
                backgroundColor: '#fafafa',
                height: '100%',
                overflowY: 'auto'
            });

            
            var label_title = document.createElement("label");
            label_title.innerHTML = "제목";
            content.appendChild(label_title);
            content.appendChild(inputTitle);
            if(listid == "reservation"){
                var label_subtitle = document.createElement("label");
                label_subtitle.innerHTML = "부제목";
                content.appendChild(label_subtitle);
                
                content.appendChild(inputSubTitle);
                var label_startdate = document.createElement("label");
                label_startdate.innerHTML = "시작일";
                content.appendChild(label_startdate);
                
                content.appendChild(inputStarttime);
                var label_enddate = document.createElement("label");
                label_enddate.innerHTML = "종료일";
                content.appendChild(label_enddate);
                content.appendChild(inputEndtime);
            }
            var label_message = document.createElement("label");
            label_message.innerHTML = "내용입력";
            content.appendChild(label_message);
            content.appendChild(inputMessage);

            // Footer
            const footer = document.createElement('div');
            Object.assign(footer.style, {
                display: 'flex',
                justifyContent: 'flex-end',
                gap: '10px',
                padding: '15px 20px',
                borderTop: '1px solid #eee',
                height: '50px',
                flexShrink: 0
            });

            const cancelBtn = document.createElement('button');
            cancelBtn.innerText = '취소';
            cancelBtn.onclick = () => overlay.remove();

            const confirmBtn = document.createElement('button');
            confirmBtn.innerText = type === "add" ? '추가' : '수정';
            confirmBtn.style.backgroundColor = '#0d6efd';
            confirmBtn.style.color = '#fff';
            confirmBtn.onclick = () => {
                updateData(
                    lt_idx,
                    inputTitle.value.trim(),
                    inputSubTitle.value,
                    inputStarttime.value,
                    inputEndtime.value,
                    inputMessage.innerHTML.trim(),
                    type
                );
                overlay.remove();
            };

            [cancelBtn, confirmBtn].forEach(btn => {
                Object.assign(btn.style, {
                    padding: '8px 16px',
                    border: 'none',
                    borderRadius: '4px',
                    cursor: 'pointer'
                });
            });

            footer.appendChild(cancelBtn);
            footer.appendChild(confirmBtn);

            // Assemble
            box.appendChild(header);
            box.appendChild(content);
            box.appendChild(footer);
            overlay.appendChild(box);
            document.body.appendChild(overlay);
        }

        


        //type : "add","edit","delete
        function updateData(lt_idx , lt_title,  lt_subtitle,  lt_startdate,  lt_enddate, lt_message, type){
            const _data = {
                "projectid": projectid,
                "groupidx": groupidx,
                "listnameid": listid,
                "ltidx":lt_idx,
                "lttitle":lt_title,
                "ltsubtitle":lt_subtitle,
                "ltstartdate":lt_startdate,
                "ltenddate":lt_enddate,
                "ltmessage":lt_message,                
                "type": type
            };
            AJAX_AdmGetGame("updatelistdata", _data, function (res) {
                console.log("getgallerydata res is ", res);
                const code = parseInt(res.code);
                if (code === 100) {

                    if(type == "add")
                        getPage(1, currentListMax, listid, projectid);
                    else
                        getPage(now_pagenum, currentListMax, listid, projectid);
                    
                } else {
                    alert("데이터를 불러오지 못했습니다.");
                }
            });
        }
        
        function showMessagePopup(title, subtitle, starttime, endtime, message) {
            // 기존 팝업 제거
            const existing = document.getElementById('popupOverlay');
            if (existing) existing.remove();

            // 1. 오버레이
            const overlay = document.createElement('div');
            overlay.id = 'popupOverlay';
            Object.assign(overlay.style, {
                position: 'fixed',
                top: 0, left: 0, right: 0, bottom: 0,
                backgroundColor: 'rgba(0,0,0,0.5)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                zIndex: 10000
            });

            // 2. 팝업 박스
            const box = document.createElement('div');
            Object.assign(box.style, {
                width: '80vw',
                height: '80vh',
                backgroundColor: '#fff',
                borderRadius: '8px',
                boxSizing: 'border-box',
                display: 'flex',
                flexDirection: 'column',
                boxShadow: '0 4px 10px rgba(0,0,0,0.3)',
                position: 'relative',
                overflow: 'hidden'
            });

            // 3. 헤더 (제목 + 닫기 버튼)
            const header = document.createElement('div');
            Object.assign(header.style, {
                flex: '0 0 auto',
                padding: '15px 20px',
                borderBottom: '1px solid #eee',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                backgroundColor: '#f9f9f9'
            });
            const hTitle = document.createElement('div');
            hTitle.innerText = title || '제목 없음';
            Object.assign(hTitle.style, {
                fontSize: '18px',
                fontWeight: 'bold',
                color: '#333'
            });
           
            const hSubTitle = document.createElement('div');
            hSubTitle.innerText = subtitle || '부제목 없음';
            Object.assign(hSubTitle.style, {
                fontSize: '18px',
                
                padding: '20px',
                color: '#a88'
            });
           
             const hStartEndtime = document.createElement('div');
            hStartEndtime.innerText = starttime.substr(0,13)+" ~ "+endtime.substr(0,13) || '부제목 없음';
            Object.assign(hStartEndtime.style, {
                fontSize: '14px',
                
                padding: '20px',
                color: '#333'
            });
           
            
            const closeBtn = document.createElement('button');
            closeBtn.innerHTML = '&times;';
            Object.assign(closeBtn.style, {
                fontSize: '24px',
                lineHeight: '1',
                border: 'none',
                background: 'none',
                cursor: 'pointer',
                color: '#999'
            });
            closeBtn.onclick = () => overlay.remove();
        
            header.appendChild(hTitle);
            
            header.appendChild(closeBtn);

            // 4. 본문
            const content = document.createElement('div');
            content.innerHTML = (message || '').replace(/\n/g, '<br>');
            Object.assign(content.style, {
                flex: '1 1 auto',
                padding: '20px',
                overflowY: 'auto',
                color: '#555',
                whiteSpace: 'pre-wrap'
            });

            // 5. 하단 닫기 버튼 (추가로 원한다면)
            const footer = document.createElement('div');
            Object.assign(footer.style, {
                flex: '0 0 auto',
                padding: '10px 20px',
                borderTop: '1px solid #eee',
                textAlign: 'right'
            });
            const btn = document.createElement('button');
            btn.innerText = '닫기';
            Object.assign(btn.style, {
                padding: '8px 16px',
                backgroundColor: '#0d6efd',
                color: '#fff',
                border: 'none',
                borderRadius: '4px',
                cursor: 'pointer'
            });
            btn.onclick = () => overlay.remove();
            footer.appendChild(btn);

            // 조립
            box.appendChild(header);
            if(listid == "reservation"){
                box.appendChild(hSubTitle);
                box.appendChild(hStartEndtime);
            }
            box.appendChild(content);
            box.appendChild(footer);
            overlay.appendChild(box);
            document.body.appendChild(overlay);
        }
