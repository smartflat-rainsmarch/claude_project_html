    <style>
        body {
            background-color: #f9fafb;
            font-family: 'Arial', sans-serif;
        }

        .highlight {
            background-color: #e0f2fe;
            border: 2px solid #0284c7;
        }

        .finished {
            background-color: #fef2f2;
            border: 2px solid #f87171;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            width: 600px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 900;
        }

        .bar {
            transition: width 1.2s ease-out;
        }

        .bar-animated {
            animation: barGrow 1.2s ease-out;
        }

        @keyframes barGrow {
            0% {
                width: 0%;
            }

            100% {
                width: var(--bar-width);
            }
        }

    </style>
</head>

                "groupidx": groupidx,
                "contentid": contentid
            }
            //현재 설문 아이디를 가져온다.
            AJAX_AdmGetGame("getnowsurveyidx", _cdata, function(res) {
                var code = parseInt(res.code);

                    var rdata = res.message; //데이타 idx  sv_idx
                    now_sv_idx = rdata["nowsurveyidx"];
                    now_sv_onoff = rdata["nowsurveyonoff"];
                    
                    var sindex = 0; //리스트 인덱스 0~ max
                    for (var i = 0; i < surveydatas.length; i++) {
                        if (surveydatas[i].sv_idx == rdata["nowsurveyidx"]) {
                            sindex = i;
                            
                            break;
                        }
                    }
                    moveToTopFirst(sindex);
                    
                }
                callback();

            });
        }

        function togglechange(key, txton, txtoff) {
            console.log("toggle change!!");
            var toggle = document.getElementById("toggle_" + key);
            var toggle_icon = document.getElementById("toggle_icon_" + key);
            var toggle_txt = document.getElementById("toggle_txt_" + key);
            if (toggle.checked) {
                console.log("토글 켜짐");
                toggle_icon.style.backgroundColor = "#33aaaa";
                toggle_txt.innerHTML = txton;
                toggleSurveyListDisabled(false);
            } else {
                console.log("토글 꺼짐");
                toggle_icon.style.backgroundColor = "#cccccc";
                toggle_txt.innerHTML = txtoff;
                toggleSurveyListDisabled(true);
            }

        }

        function toggleSurveyListDisabled(flg) {

                    child.classList.add('bg-gray-200', 'text-gray-500', 'opacity-50', 'pointer-events-none');
                    
                } else {
                    console.log("목록켠다.");
                    // 켠 상태: 원래대로

            updateNowSurvay();

        function showDelete(sv_idx) {
            var sdata = null;
            for (var i = 0; i < surveydatas.length; i++) {
                if (surveydatas[i].sv_idx == sv_idx) {
                    sdata = surveydatas[i];

        function showConfirmPopup({
            message,
            onConfirm,
            okTxt
        }) {
            const existing = document.getElementById('popupOverlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.id = 'popupOverlay';
            Object.assign(overlay.style, {
                position: 'fixed',
                top: 0,
                left: 0,
                right: 0,
                bottom: 0,
                backgroundColor: 'rgba(0,0,0,0.5)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                zIndex: 10000
            });

            const box = document.createElement('div');
            Object.assign(box.style, {
                width: 'auto',
                backgroundColor: '#fff',
                borderRadius: '8px',
                padding: '20px',
                boxShadow: '0 4px 4px rgba(0,0,0,0.3)',
                textAlign: 'center',
               
                
            });

            const text = document.createElement('div');
            text.innerHTML = message;
            Object.assign(text.style, {
                marginBottom: '20px',
                fontSize: '16px',
                color: '#333'
            });

            const btnWrapper = document.createElement('div');

                gap: '5px'
            });

            const cancelBtn = document.createElement('button');

            deleteBtn.style.backgroundColor = '#dc3545';
            deleteBtn.style.color = '#fff';
            deleteBtn.onclick = () => {
                onConfirm();
                overlay.remove();
            };

            [cancelBtn, deleteBtn].forEach(btn => {
                Object.assign(btn.style, {
                    padding: '8px 16px',
                    border: 'none',
                    borderRadius: '4px',
                    cursor: 'pointer'
                });
            });

            btnWrapper.appendChild(cancelBtn);
            btnWrapper.appendChild(deleteBtn);
            box.appendChild(text);
            box.appendChild(btnWrapper);
            overlay.appendChild(box);
            document.body.appendChild(overlay);
        }
        function sendDeleteSurvay(sv_idx) {

                var code = parseInt(res.code);

                    var new_surveydatas = [];

                        if (surveydatas[i].sv_idx != sv_idx) {
                            new_surveydatas.push(surveydatas[i]);
                        }
                    }
                    surveydatas = new_surveydatas;
                    renderSurveys();

                }

            });
        }

        function renderSurveys() {
            list.innerHTML = '';
            surveydatas.forEach((s, index) => {
                const svidx = s.sv_idx;
                
                var _enddate = s.sv_enddate.substr(0,10)+" 23:59:59";
                const endDate = new Date(_enddate);
                const isFinished = today > endDate;
                console.log("index is " + index);
                var bg_color = index == 0 ? "#e2faf9" : "#ffffff";
                if(isFinished)bg_color = "#dddddd";
                const wrapper = document.createElement('div');
                wrapper.style.backgroundColor = bg_color;
                wrapper.className = `bg-white p-6 rounded-lg shadow flex justify-between items-center ${index === 0 ? 'highlight' : ''} ${isFinished ? 'finished' : ''}`;
                wrapper.innerHTML = `
                    <div class="flex items-center space-x-3" >
                        <div>
                        <p class="text-xl font-semibold">📊 ${s.sv_title}</p><br>
                        <p class="text-sm text-gray-500">기간: ${s.sv_startdate.substr(0,10)} ~ ${s.sv_enddate.substr(0,10)}</p>
                        ${isFinished ? '<p class="text-sm text-red-600 font-semibold mt-1">✅ 설문이 종료되었습니다</p>' : '<p class="text-sm text-green-600 font-semibold mt-1">🟢 설문 진행 중</p>'}
                        </div>
                        </div>
                        <div class="space-x-2">
                        <button class="text-sm text-blue-600 border border-blue-600 rounded px-3 py-1 hover:bg-blue-100" onclick="moveToTop(${index})">상단 고정</button>
                        <button class="text-sm text-green-600 border border-green-600 rounded px-3 py-1 hover:bg-green-100" onclick='showResult(${s.sv_idx})'>결과보기</button>

                    </div>
                `;
                list.appendChild(wrapper);
            });
        }
         function moveToTopFirst(index) {

        function showResult(sv_idx) {
            var json_svdatas = null;
            for (var i = 0; i < surveydatas.length; i++) {
                if (surveydatas[i].sv_idx == sv_idx) {

                    json_svdatas = surveydatas[i].sv_data != "" ? JSON.parse(surveydatas[i].sv_data) : [];
                    break;
                }
            }

            var resultArr = [];
            var labels = [];
            for (var i = 0; i < json_svdatas.length; i++) {
                labels.push(json_svdatas[i].name);
                if (!json_svdatas[i].icons) json_svdatas[i].icons = [];
                resultArr.push(json_svdatas[i].icons.length);
            }

            document.getElementById('resultOverlay').classList.remove('hidden');
            document.getElementById('resultModal').classList.remove('hidden');

            const content = document.getElementById('resultContent');
            content.innerHTML = '';


            const max = Math.max(...resultArr);


            resultArr.forEach((count, i) => {
                const percent = Math.round((count / max) * 100);
                const li = document.createElement('li');
                const barColor = ['bg-red-400', 'bg-green-400', 'bg-blue-400', 'bg-yellow-400'][i % 4];

                li.innerHTML = `
                  <div class="flex justify-between mb-1" >
                    <span class="font-medium text-gray-700">${labels[i]}</span>
                    <span class="text-gray-500">${count}표</span>
                  </div>
                  <div class="w-full h-5 bg-gray-200 rounded-full overflow-hidden">
                    <div class="h-5 ${barColor} rounded-full bar bar-animated" style="--bar-width:${percent}%; width:${percent}%"></div>
                  </div>
                `;
                content.appendChild(li);
            });
        }

        function closeResult() {
            document.getElementById('resultOverlay').classList.add('hidden');
            document.getElementById('resultModal').classList.add('hidden');
        }

    </script>
