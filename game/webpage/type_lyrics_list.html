        function togglechange(key, txton, txtoff) {
            console.log("toggle change!!");
            var toggle = document.getElementById("toggle_" + key);

            var toggle_txt = document.getElementById("toggle_txt_" + key);
            if (toggle.checked) {

                toggle_txt.innerHTML = txton;
                togglelyricsListDisabled(false);
            } else {

                toggle_txt.innerHTML = txtoff;
                togglelyricsListDisabled(true);

        function insertMP3(){
           
            if(bgmlist.length >= 5){
                alertMsg("파일은 최대 5개까지 등록 가능합니다.\n 필요없는 파일을 삭제해 주세요");
                return;
            }
            
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'mp3/*';
            input.style.display = 'none';

            input.onchange = function () {
                let file = input.files[0];
                if (!file) return;

                const _data = {
                    "projectid": projectid,
                     "groupidx": groupidx,
                    "listnameid": contentid                    
                };
                uploadFormProcess("../../ssapi/adm_game.php","insertmp3",_data,null,null,input,function(res){
                    console.log("res",res);
                    if (res == "success") {
                        console.log("mp3파일 추가 성공!!");
                        bgmlist.push({"date":C_getToday(new Date(),"yyyy-mm-dd"),"filename":file.name});
                        alertMsg(file.name+" 추가 성공!!");
                    }
                }); 
            };

            document.body.appendChild(input);
            input.click();
            document.body.removeChild(input);
        
        }
        //lr_idx 가 있다면 수정 , 없다면 삽입
        function insertlyrics(lr_idx) {
