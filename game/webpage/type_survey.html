<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>스티커 설문 시스템</title>

    <script src="./libs/tailwindcss.js"></script>
   <script src="./libs/chart.js"></script>
    <script src="./libs/jquery/jquery-3.5.1.min.js" crossorigin="anonymous"></script>
    <script src="./js/scripts.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
        }

        .sticker {
            position: absolute;
            pointer-events: none;
            font-size: 48px;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            animation: pop-in 0.4s ease-out forwards;
        }

        @keyframes pop-in {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }

            80% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .message-box {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-size: 2rem;
            padding: 2rem 3rem;
            border-radius: 1rem;
            display: none;
            z-index: 100;
        }

        #historyPanel {
            position: absolute;
            top: 80px;
            right: 1rem;
            background: #1f2937;
            color: white;
            border-radius: 0.5rem;
            padding: 0.75rem 1.25rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 50;
            display:none;
            /*      box-shadow: 0 4px 10px rgba(0,0,0,0.2);*/
        }

        #historyModal {
            display: none;
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            z-index: 200;
        }
        
        .bar {
            transition: width 1.2s ease-out;
        }

        .bar-animated {
            animation: barGrow 1.2s ease-out;
        }

        @keyframes barGrow {
            0% {
                width: 0%;
            }

            100% {
                width: var(--bar-width);
            }
        }

    </style>
</head>

<body style="overflow-y: scroll;height:auto">

    <!-- 📱 사용자 키오스크 설문 화면 -->
    
        <h2 class="text-4xl font-bold mb-4 text-center" id='label_title' style="margin-top:20px"></h2> <!--  타이틀 -->
        <p class="text-xl text-gray-500 mb-8 text-center" id='label_startenddate'></p><!-- 기간표시 -->

        <div id="board" >
<!--
            <div class="relative bg-yellow-100 h-72 rounded-lg flex items-center justify-center text-center font-semibold cursor-pointer hover:bg-yellow-200" onclick="showStickerPicker(event)">🍱 김치볶음밥</div>
            <div class="relative bg-yellow-100 h-72 rounded-lg flex items-center justify-center text-center font-semibold cursor-pointer hover:bg-yellow-200" onclick="showStickerPicker(event)">🍲 떡볶이</div>
            <div class="relative bg-yellow-100 h-72 rounded-lg flex items-center justify-center text-center font-semibold cursor-pointer hover:bg-yellow-200" onclick="showStickerPicker(event)">🥩 미트볼</div>
            <div class="relative bg-yellow-100 h-72 rounded-lg flex items-center justify-center text-center font-semibold cursor-pointer hover:bg-yellow-200" onclick="showStickerPicker(event)">🍝 스파게티</div>
-->
        </div>

        <!-- 메시지 -->
        <div id="completeMessage" class="message-box">✅ 참여가 완료되었습니다!</div>
        <div id="warningMessage" class="message-box bg-red-700">⚠️ 잠시 후 다시 참여해주세요!</div>
        <div id="overtimeMessage" class="message-box bg-red-700">⚠️ 참여 기간이 지났어요!</div>
        <div id="overcountMessage" class="message-box bg-red-700">⚠️ 더이상 참여할 수 없어요!</div>

        <!-- 스티커 선택 팝업 -->
        <div id="stickerPicker" class="hidden absolute bg-white border-2 border-gray-300 rounded-xl shadow-xl p-4 grid grid-cols-5 gap-4 text-5xl z-50"></div>

        <!-- 📂 지난 설문 보기 버튼 -->
        <div id="historyPanel" onclick="toggleHistoryModal()">📂 설문결과 보기</div>

        <!-- 📊 지난 설문 결과 모달 -->
        <div id="historyModal">
            <h3 id="result_survey_title" class="text-2xl font-bold mb-6">📊 설문 결과: </h3>
<!--            <canvas id="resultChart" height="200"></canvas>-->
            <ul id="resultContent" class="space-y-4"></ul>
            <button onclick="toggleHistoryModal()" class="mt-6 w-full bg-gray-800 text-white py-3 rounded-lg text-lg">닫기</button>
        </div>
        
        
        
        <div id="resultOverlay" class="overlay hidden"></div>
        <div id="resultModal" class="modal hidden">
<!--            <h2 class="text-xl font-bold mb-4">📊 설문 결과</h2>-->
<!--            <ul id="resultContent" class="space-y-4"></ul>-->
<!--            <button onclick="closeResult()" class="mt-6 w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">닫기</button>-->
        </div>
   

    <script>
        var label_title = document.getElementById("label_title");
        var label_startenddate = document.getElementById("label_startenddate");
        var board = document.getElementById("board");
        var historyPanel = document.getElementById("historyPanel");

        console.log("survey location is " + location.href);
        
        let clickX = 0;
        let clickY = 0;
        let cooldown = false;

//        const stickerOptions = ['🐻', '🦊', '🐼', '🐸', '🐙', '🐳', '🦄', '🐔', '🧁', '🎈'];
        
         const stickerOptions = ['001.png', '002.png', '003.png', '004.png', '005.png', '006.png', '007.png', '008.png', '009.png', '010.png'];


        var projectid = getParam("projectid") ? getParam("projectid") : "sample";
        var groupidx = getParam("groupidx") ? getParam("groupidx") : 0;
        var surveyidx = getParam("surveyidx") ? getParam("surveyidx") : 0; //설문 아이디
        var surveyonoff = getParam("surveyonoff") ? getParam("surveyonoff") : 0; //설문 아이디
       
        //    var editmode = getParam("editmode") ? getParam("editmode") : 0;  //게시판 아이디
        //    var gamemode = getParam("gamemode") ? getParam("gamemode") : 0;
        //    var nowindex = 0; //
        var surveydata = null;
        var json_svdatas = null;
        $(document).ready(function() {


            //설문이 꺼져있다면
            if(surveyonoff == 0){
                empty_survey();
                return;
            }
            //설문이 켜져있다면
            else {
                var _data = {
                    "projectid": projectid,
                    "groupidx": groupidx,
                    "surveyidx": surveyidx,
                    "type":"survey"

                }
                AJAX_AdmGetGame("getsurveydata", _data, function(res) {
                    var code = parseInt(res.code);
                    if (code == 100) {
                        if(res.message){
                            surveydata = res.message;
                            var _enddate = surveydata.sv_enddate.substr(0,10)+" 23:59:59";
                            const isFinish = isWithinPeriod(surveydata.sv_startdate, _enddate);
                            
                            if(isFinish == 1) //설문 기간이다
                                init_survey();
                            else if (isFinish == 0) //설문종료됨
                                end_survey(surveydata.sv_title);
                            else  //설문시작전
                                ready_survey(surveydata.sv_startdate);
                        }
                    }else {
                        empty_survey();
                    }

                });
            }

        });
        function ready_survey(startdate){
            label_title.style.marginTop = "440px";
            label_title.innerHTML = "📊 "+title+" (설문시작전) "+startdate.substr(0,10)+" 일 시작";
            historyPanel.style.display = "none";
        }
        function end_survey(title){
            label_title.style.marginTop = "440px";
            label_title.innerHTML = "📊 "+title+" (설문종료됨)";
            historyPanel.style.display = "none";
        }
        function empty_survey(){
            label_title.style.marginTop = "440px";
            label_title.innerHTML = "📊 현재 설문중인 내용이 없습니다.";
            historyPanel.style.display = "none";
        }
        function init_survey() {
            label_title.innerHTML = "📊 "+surveydata.sv_title;
            label_startenddate.innerHTML = surveydata.sv_startdate.substr(0, 10) + " ~ " + surveydata.sv_enddate.substr(0, 10);

            json_svdatas = surveydata.sv_data !== "" ? JSON.parse(surveydata.sv_data) : [];

            board.innerHTML = "";
            
            historyPanel.style.display = surveydata.sv_resultopen == 0 ? "none" : "block";
            
            var len = 0;
            
            for (let i = 0; i < json_svdatas.length; i++) {
                console.log("json_svdatas["+i+"].name is "+json_svdatas[i].name);
                if(json_svdatas[i].name != "")len++;
            }
            
            for (let i = 0; i < len; i++) {
                const svdata = json_svdatas[i];
                var name = json_svdatas[i].name;
                console.log("naem is "+name);
                if(len == 2){      //설문이 2개다
                    const itemDiv = document.createElement("div");
                    itemDiv.id = `item-${i}`;
                    itemDiv.innerHTML = svdata.name;
                    itemDiv.style = "width:95%;color:white;height:540px;border-radius:20px;margin:30px;padding:20px;background-color:#f2faf9;box-shadow: 0 4px 4px 0 rgba(0, 0, 0, 0.25);";

                    itemDiv.addEventListener("click", function(e) {
                      showStickerPicker(e, i);
                    });
                    itemDiv.innerHTML =  getTag_Label(null,json_svdatas[i].name,"font-size:24px;background-color:#009ef7;font-weight:bold;border-radius:10px;padding:7px 20px 10px 20px;");
                    board.appendChild(itemDiv);
                    
                }else if(len == 3){ //설문이 3개다
                    const itemDiv = document.createElement("div");
                    itemDiv.id = `item-${i}`;
                    itemDiv.innerHTML = svdata.name;
                    itemDiv.style = "width:95%;color:white;height:340px;border-radius:20px;margin:30px;padding:20px;background-color:#f2faf9;box-shadow: 0 4px 4px 0 rgba(0, 0, 0, 0.25);";

                    itemDiv.addEventListener("click", function(e) {
                      showStickerPicker(e, i);
                    });
                    itemDiv.innerHTML =  getTag_Label(null,json_svdatas[i].name,"font-size:24px;background-color:#009ef7;font-weight:bold;border-radius:10px;padding:7px 20px 10px 20px;");
                    board.appendChild(itemDiv);
                    
                }else {     //설문이 4개다
                    var tDiv = null;
                    var bDiv = null;
                    if(i == 0){
                         tDiv = document.createElement("div");    
                         tDiv.style.display = "flex";
                         tDiv.id = "tDiv";
                         tDiv.style.paddingLeft = "20px";
                         board.appendChild(tDiv);
                         bDiv = document.createElement("div");    
                         bDiv.style.display = "flex";
                         bDiv.id = "bDiv";
                         bDiv.style.paddingLeft = "20px";
                         board.appendChild(bDiv);
                    }else {
                        tDiv = document.getElementById("tDiv");
                        bDiv = document.getElementById("bDiv");
                    }
                    
                    const itemDiv = document.createElement("div");
                    itemDiv.id = `item-${i}`;
                    itemDiv.innerHTML = svdata.name;
                    itemDiv.style = "width:47%;color:white;height:540px;border-radius:20px;margin:10px;padding:20px;background-color:#f2faf9;box-shadow: 0 4px 4px 0 rgba(0, 0, 0, 0.25);";

                    itemDiv.addEventListener("click", function(e) {
                      showStickerPicker(e, i);
                    });
                    itemDiv.innerHTML =  getTag_Label(null,json_svdatas[i].name,"font-size:24px;background-color:#009ef7;font-weight:bold;border-radius:10px;padding:7px 20px 10px 20px;");
                    
                    if(i < 2)
                        tDiv.appendChild(itemDiv);
                    else 
                        bDiv.appendChild(itemDiv);
               
                }
            }

            for (let i = 0; i < len; i++) {
                const svdata = json_svdatas[i];
                
                if(!svdata.icons)svdata.icons = [];
                for (const icon of svdata.icons) {
                    const index = parseInt(icon.iconidid);
                    const icon_src = "uiimg/survey_icon/"+surveydata.sv_iconid+"/"+stickerOptions[index];

                    const sticker = document.createElement('div');
                    sticker.className = 'sticker';
                    sticker.innerHTML = "<img src='"+icon_src+"' style='width:100px;height:100px'/>";
                    sticker.style.position = 'absolute';
                    sticker.style.left = `${icon.x}px`;
                    sticker.style.top = `${icon.y}px`;

                    board.appendChild(sticker);
                }                
            }

        }


        function isOverCount() {
            var max = surveydata.sv_max;
            var now_cnt = 0;
            for(var i = 0 ; i < json_svdatas.length;i++){
                var len = json_svdatas[i].icons ? json_svdatas[i].icons.length : 0;
                now_cnt += len;
                
            }
            return now_cnt >= max ? true : false;
        }
        function isOverTime() {
            var startdate = surveydata.sv_startdate;
            var enddate = surveydata.sv_enddate.substr(0,10)+" 23:59:59";
            const now = new Date();
            const end = new Date(enddate);
            return now > end;
        }
        function showStickerPicker(event, idx) {
            if (cooldown) {
                showWarningMessage();
                return;
            }
            if (isOverTime()) {
                showOvertimeMessage();
                return;
            }
            if (isOverCount()) {
                showOvercountMessage();
                return;
            }

            const picker = document.getElementById('stickerPicker');
            picker.innerHTML = '';

            let cnt = 0;
            stickerOptions.forEach(icon => {
                const _icidx = cnt;
                const btn = document.createElement('button');
                btn.className = 'hover:bg-gray-100 p-2 rounded-full shadow-sm';
                
                var icon_src = "uiimg/survey_icon/"+surveydata.sv_iconid+"/"+icon;
                btn.innerHTML = "<img src='"+icon_src+"' style='width:60px;height:60px'/>";
                btn.onclick = () => placeSticker(icon, idx, _icidx);
                picker.appendChild(btn);
                cnt++;
            });

            const boardRect = document.getElementById('board').getBoundingClientRect();
//            clickX = event.clientX - boardRect.left;
//            clickY = event.clientY - boardRect.top;
            clickX = event.clientX;
            clickY = event.clientY;

            // 👉 오른쪽 요소일 경우 왼편에 표시 (1번, 3번)
            const pickerWidth = 120; // 스티커 창 너비 예상값 (px)
            let pickerLeft = clickX;
            
//            if (idx === 1 || idx === 3) 
            {
                pickerLeft = clickX - 500;
                if (pickerLeft < 0) pickerLeft = 0; // 화면 밖으로 안나가게
            }

            picker.style.left = `${pickerLeft}px`;
            picker.style.top = `${clickY}px`;
            picker.classList.remove('hidden');

            board = document.getElementById('board');
        }

        function updateSticker(callback){
            var _data = {
                "projectid": projectid,
                "groupidx": groupidx,
                "surveyidx": surveyidx,
                "json_svdatas" :json_svdatas

            }
            AJAX_AdmGetGame("updatesvsticker", _data, function(res) {
                var code = parseInt(res.code);
                if (code == 100) {
                    
                   
                    callback("success");
                }else{
                    callback("error");
                }

            });
        }

        function placeSticker(icon, idx, iconid) {
            if (cooldown) return;
            const sticker = document.createElement('div');
            sticker.className = 'sticker';
            
            
             var icon_src = "uiimg/survey_icon/"+surveydata.sv_iconid+"/"+icon;
            sticker.innerHTML = "<img src='"+icon_src+"' style='width:100px;height:100px'/>";
            
            sticker.style.left = `${clickX}px`;
            sticker.style.top = `${clickY}px`;
            board.appendChild(sticker);
            
            if(!json_svdatas[idx].icons)json_svdatas[idx].icons = [];
            json_svdatas[idx].icons.push({
                "iconidid": iconid+"",
                "x": clickX+"",
                "y": clickY+""
            });
            
             updateSticker(function(res){
                 if(res == "success"){
                     
                    
                     surveydata.sv_data = JSON.stringify(json_svdatas);
                     
                    document.getElementById('stickerPicker').classList.add('hidden');
                    cooldown = true;
                    showCompleteMessage();

                    setTimeout(() => {
                        cooldown = false;
                        hideMessages();
                        init_survey();
                    }, 10000);
                 }
             });
            
        }

        function showCompleteMessage() {
            document.getElementById('completeMessage').style.display = 'block';
        }

        function showWarningMessage() {
            const warn = document.getElementById('warningMessage');
            warn.style.display = 'block';
            setTimeout(() => {
                warn.style.display = 'none';
            }, 2000);
        }
        function showOvertimeMessage() {
            const overtime = document.getElementById('overtimeMessage');
            overtime.style.display = 'block';
            setTimeout(() => {
                overtime.style.display = 'none';
            }, 2000);
        }

        function hideMessages() {
            document.getElementById('completeMessage').style.display = 'none';
            document.getElementById('warningMessage').style.display = 'none';
        }

        function toggleHistoryModal() {
            const modal = document.getElementById('historyModal');
            if (modal.style.display === 'none' || modal.style.display === '') {
                modal.style.display = 'block';
//                renderChart();
                showResult();
            } else {
                modal.style.display = 'none';
            }
        }
        
        function showResult(sv_idx) {

            var json_svdatas = JSON.parse(surveydata.sv_data);
            var resultArr = [];
            var labels = [];
            for (var i = 0; i < json_svdatas.length; i++) {
                if(json_svdatas[i].name){
                    labels.push(json_svdatas[i].name);
                    var icon_len = json_svdatas[i].icons ? json_svdatas[i].icons.length : 0;
                    resultArr.push(icon_len);    
                }
                
            }

            document.getElementById('resultOverlay').classList.remove('hidden');
            document.getElementById('resultModal').classList.remove('hidden');

            const content = document.getElementById('resultContent');
            content.innerHTML = '';
            var result_survey_title = document.getElementById("result_survey_title");
            result_survey_title.innerHTML = "📊 설문결과 : "+surveydata.sv_title;
            const max = Math.max(...resultArr);


            resultArr.forEach((count, i) => {
                const percent = Math.round((count / max) * 100);
                const li = document.createElement('li');
                const barColor = ['bg-red-400', 'bg-green-400', 'bg-blue-400', 'bg-yellow-400'][i % 4];
               
                li.innerHTML = `
                  <div class="flex justify-between mb-1" >
                    <span class="font-medium text-gray-700">${labels[i]}</span>
                    <span class="text-gray-500">${count}표</span>
                  </div>
                  <div class="w-full h-5 bg-gray-200 rounded-full overflow-hidden">
                    <div class="h-5 ${barColor} rounded-full bar bar-animated" style="--bar-width:${percent}%; width:${percent}%"></div>
                  </div>
                `;
                content.appendChild(li);
            });
        }

        function closeResult() {
            document.getElementById('resultOverlay').classList.add('hidden');
            document.getElementById('resultModal').classList.add('hidden');
        }

        window.addEventListener('click', function(e) {
            const picker = document.getElementById('stickerPicker');
            if (!picker.contains(e.target) && !e.target.closest('#board')) {
                picker.classList.add('hidden');
            }
             window.parent.postMessage("iframe_clicked", "*");
        });
        
       
        // ✅ 스크롤 이벤트
        window.addEventListener("scroll", () => {
          window.parent.postMessage("iframe_scrolled", "*");
        });
    </script>

</body>

</html>
