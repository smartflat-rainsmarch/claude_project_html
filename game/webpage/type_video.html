<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Background</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      height: 100%;
      width: 100%;
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* 비율 유지하며 채우기 */
    }
  </style>
</head>
<body>
  <video id="bg-video" autoplay muted loop playsinline></video>

  <script>
    // URL 파라메터에서 video 경로 읽기
    const params = new URLSearchParams(window.location.search);
    var videoUrl = params.get("url");
      videoUrl = videoUrl.replace("../../../game","../");
      console.log("type_video.html 호출!!");
    if (videoUrl) {
      const video = document.getElementById("bg-video");
      video.src = videoUrl;
    } else {
      console.error("video URL 파라메터가 없습니다. 예: ?url=video/sample.mp4");
    }
      
      
       // 예: 클릭 감지
    document.addEventListener("click", () => {
      window.parent.postMessage("iframe_clicked", "*");
    });
      // ✅ 스크롤 이벤트
    window.addEventListener("scroll", () => {
      window.parent.postMessage("iframe_scrolled", "*");
    });
  </script>
</body>
</html>
