<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Video List</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            font-family: sans-serif;
        }

        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 16px;
        }

        .video-item {
            background-color: #111;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .video-item:hover {
            transform: scale(1.03);
        }

        .video-thumb {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background-color: #222;
        }

        .video-name {
            padding: 8px;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div id="video-grid"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

                console.log("videoList String : "+str_videoList);

                    const name = document.createElement("div");
                    name.className = "video-name";
                    name.innerText = video.path.split("/").pop();

                    item.appendChild(img);
                    item.appendChild(name);
                    grid.appendChild(item);
                });

            } catch (e) {
                console.error("Error loading video list:", e);
            }
        });

      
       // 예: 클릭 감지
    document.addEventListener("click", () => {
      window.parent.postMessage("iframe_clicked", "*");
    });
      // ✅ 스크롤 이벤트
    window.addEventListener("scroll", () => {
      window.parent.postMessage("iframe_scrolled", "*");
    });
  </script>
</body>
</html>
