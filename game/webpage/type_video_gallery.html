    <style>
        body {
            background-color: #fff;
            color: #fff;
            margin: 0;
            font-family: sans-serif;
        }

        #video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 16px;
        }

        .video-item {
            background-color: #111;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .video-item:hover {
            transform: scale(1.03);
        }

        .video-thumb {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background-color: #222;
        }

        .video-name {
            padding: 8px;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

     function sendPush(fcmtoken, command_key, seq, arg){
         var _data = {
             "fcmtoken" : fcmtoken,
             "command" : command_key,
             "seq" : seq             
         }
          AJAX_AdmGetGame("push", _data, function(res){

                }
           }               
        });

    function getVideoList(callback){
        if(window.android){
            isAppMode = true;
            const str_videoList = android.getVideoListWithThumbs();
            const videoList = JSON.parse(str_videoList);
            callback(videoList);
        }else{
            isAppMode = false;
             const _data = {
                "projectid": projectid,
                "groupidx": groupidx
              
            };
            AJAX_AdmGetGame("getvideolist", _data, function (res) {
                console.log("getgallerydata res is ", res);
                const code = parseInt(res.code);
                if (code === 100) {
                    const videoList = res.message ? JSON.parse(res.message) : [];
                     callback(videoList);
                } else {
                    alert("데이터를 불러오지 못했습니다.");
                }
            });
        }
