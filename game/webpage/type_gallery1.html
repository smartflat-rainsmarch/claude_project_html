        body {
            font-family: Arial;
            display: flex;
            justify-content: center;

        }
        #puzzle-container {
            position: relative;
            width: 880px;
            height: 880px;
            border: 2px solid #ccc;
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
        }
        .tile {
            position: absolute;
            width: 220px;
            height: 220px;
            background-size: 880 880px;
            transition: all 0.1s ease;
            box-sizing: border-box;
            border: 1px solid #fff;
            cursor: pointer;
        }

        #clear-message {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 10;
        }
        #timer {
            position: absolute;
            top: 10px;
            left:50%;
            transform: translateX(-50%);
            font-size: 24px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 15px;
            border-radius: 10px;
        }
       .fade {
            transition: opacity 1s ease;
            opacity: 0;
            pointer-events: none;
        }
        .fade.show {
            opacity: 1;
            pointer-events: auto;
        }
      
      @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
    }

    #btn_game {
      float: right;
      width: 50px;
      height: 50px;
      margin-top: -50px;

      animation: pulse 2s infinite; /* 애니메이션 적용 및 반복 */

      animation-play-state: paused; /* 마우스 오버 시 애니메이션 일시 정지 (선택 사항) */

        function loadNextImages() {

        function loadImages(page, max) {
            if (isLoadingImages) return;
            isLoadingImages = true;

            var _data = {
                "projectid": projectid,
                "groupidx": groupidx,
                "page": page,
                "imgfoldername": imgfoldername,
                "maxcount": max
            };

            AJAX_AdmGetGame("getgallerydata", _data, function(res) {
                console.log("------------- " + imgfoldername);
                console.log("이미지로드했다. is ", res);

                var code = parseInt(res.code);

                 if (code == 100) {
                    var getdatas = res.message || [];

                    if (getdatas.length === 0) {
                        isLoadingImages = false;
                        return;
                    }

                    // 추가 전 기존 개수 저장
                    var oldCount = alldatas.length;

                    for (var i = 0; i < getdatas.length; i++) {
                        alldatas.push(getdatas[i]);
                    }

                    if (!isSwiperInitialized) {
                        // 최초에는 DOM에 직접 넣고 init
                        appendSlidesToDom(getdatas, oldCount);

                        init();
                        isSwiperInitialized = true;

                        // 최초 한 번만
                        initMainImage();
                    } else {
                        // 이후에는 swiper API로 추가
                        appendSlidesToSwiper(getdatas, oldCount);

                        refreshSwiperAfterAppend(oldCount);
                    }

                    addBottomImages(getdatas);
                    now_page++;
                }

                isLoadingImages = false;
            });
        }
        function refreshSwiperAfterAppend(firstNewIndex) {
            if (!swiper) return;

            if (swiper.params.loop) {
                swiper.loopDestroy();
                swiper.update();
                swiper.loopCreate();
                swiper.update();

                // 새로 추가된 첫 번째 이미지로 이동
                swiper.slideToLoop(firstNewIndex, 0, false);
            } else {
                swiper.update();
                swiper.slideTo(firstNewIndex, 0, false);
            }

            if (swiper.autoplay && !swiper.autoplay.running) {
                swiper.autoplay.start();
            }
        }
        function appendSlidesToDom(getdatas, startIndex) {
            for (var i = 0; i < getdatas.length; i++) {
                var data = getdatas[i];
                var path = "../school/" + projectid + "/v" + groupidx + "/contentdata/" + imgfoldername + "/" + data.filename;

                var div = document.createElement("div");
                div.className = "swiper-slide";

                var img = document.createElement("img");
                img.src = path;

                if (orientation == "P") {
                    img.style.width = imgw;
                } else {
                    img.style.height = imgh;
                }

                img.style.objectFit = "cover";
                img.id = "img_swiper_" + (startIndex + i);
                img.setAttribute("alt", "Image " + (startIndex + i));

                div.appendChild(img);
                swiper_wrapper.appendChild(div);
            }
        }

        function appendSlidesToSwiper(getdatas, startIndex) {
            if (!swiper) return;

            var slides = [];

            for (var i = 0; i < getdatas.length; i++) {
                var data = getdatas[i];
                var path = "../school/" + projectid + "/v" + groupidx + "/contentdata/" + imgfoldername + "/" + data.filename;
                slides.push(makeSlideHtml(path, startIndex + i));
            }

            swiper.appendSlide(slides);
        }
        function makeSlideHtml(path, idx) {
            var styleText = "";

            if (orientation == "P") {
                styleText += "width:" + imgw + ";";
            } else {
                styleText += "height:" + imgh + ";";
            }

        function refreshSwiper() {
            if (!swiper) return;

            var currentRealIndex = swiper.realIndex;

            if (swiper.params.loop) {
                swiper.loopDestroy();
                swiper.update();
                swiper.loopCreate();
                swiper.update();
                swiper.slideToLoop(currentRealIndex, 0, false);
            } else {
                swiper.update();
                swiper.slideTo(currentRealIndex, 0, false);
            }

            if (swiper.autoplay && !swiper.autoplay.running) {
                swiper.autoplay.start();

        function createTile(x, y, index, imgSrc) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.style.left = `${x * TILE_SIZE}px`;
            tile.style.top = `${y * TILE_SIZE}px`;
            tile.style.backgroundImage = `url(${imgSrc})`;
            tile.style.backgroundPosition = `-${(index % COLS) * TILE_SIZE}px -${Math.floor(index / COLS) * TILE_SIZE}px`;
            tile.dataset.index = index;

            tile.addEventListener('click', () => moveTile(tile));

            return tile;
        }
        function moveTile(tile) {
            console.log("isgame is "+isgame);
            if(!isgame)return;
            const tilePos = tiles.findIndex(t => t && t.element === tile);
            const tileX = tilePos % COLS;
            const tileY = Math.floor(tilePos / COLS);
            const blankX = blankIndex % COLS;
            const blankY = Math.floor(blankIndex / COLS);

            const dx = Math.abs(tileX - blankX);
            const dy = Math.abs(tileY - blankY);

            if ((dx + dy) === 1) {
                tile.style.left = `${blankX * TILE_SIZE}px`;
                tile.style.top = `${blankY * TILE_SIZE}px`;
                tiles[blankIndex] = tiles[tilePos];
                tiles[tilePos] = undefined;
                blankIndex = tilePos;

                checkIfSolved();
            }
        }
        //게임종료인지 체크
        function checkIfSolved() {
            for (let i = 0; i < 15; i++) {
                if (!tiles[i] || parseInt(tiles[i].element.dataset.index) !== i) {
                    return;
                }
            }

            
            const time = ((Date.now() - startTime) / 1000).toFixed(2);
            const rank_str = ["["+time+"초]<br> 너는 세계최고 퍼즐게이머!", "["+time+"초]<br>최고다음~~잘했어~", "["+time+"초]<br>이정도면 선방했어~"];
            const msg = document.getElementById('clear-message');
            const rank = updateRankingData(time);
            
            msg.innerHTML = rank >= 0 && rank <3 ? rank_str[rank] : "분발해봐!<br>"+time+"초";
            msg.style.display = 'block';
            clearInterval(timerInterval);
            if(rank < 0 || rank >= 3){
                
                setTimeout(function(){
                    hideGame();
                },3000);
            }
                
        }
        function updateRankingData(time) {
            let rank = -1;

            for (let i = 0; i < rankingData.puzzle.length; i++) {
                if (time <= rankingData.puzzle[i].score) {
                    rank = i;
                    break;
                }
            }

            if (rankingData.puzzle.length < 3) {
                if (rank === -1) {
                    rank = rankingData.puzzle.length;
                }
            } else if (rank === -1 || rank >= 3) {
                // 3등 안에 못 들어감
                return -1;
            }

            showInputRankingPopup(time, rank);
            return rank;
        }

        function cropImageToSquare(callback) {
//            const img = document.getElementById('main_image');//aaaaa
            
            const img = document.querySelectorAll('.swiper-slide')[swiper.realIndex].querySelector('img');
            console.log("cropImageToSquare ",img);
            const canvas = document.getElementById('cropped_canvas');
            const ctx = canvas.getContext('2d');

            //img.onload = () => {
                const sw = img.naturalWidth;
                const sh = img.naturalHeight;
                const side = Math.min(sw, sh);
                const sx = (sw - side) / 2;
                const sy = (sh - side) / 2;

                canvas.width = TILE_SIZE*4;
                canvas.height = TILE_SIZE*4;

                // Draw square cropped image into canvas
                ctx.drawImage(img, sx, sy, side, side, 0, 0, TILE_SIZE*4, TILE_SIZE*4);

                const croppedDataUrl = canvas.toDataURL();
                callback(croppedDataUrl);
            
        }

                    lbl_rank3.innerHTML = rankingData.puzzle[i]["nickname"]+"<br><span style='color:blue;font-weight:400'>"+rankingData.puzzle[i]["score"]+"초</span>";
            }
        }

        function start_puzzle(imgSrc) {
            
            const container = document.getElementById('puzzle-container');
            
            showGame();
//            const imgSrc = img.src;

            // 초기화
            container.innerHTML = '';
            tiles = [];
            blankIndex = 15;

            let index = 0;
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const realIndex = y * COLS + x;
                    if (realIndex !== 15) { // 마지막 타일은 빈칸
                        const tile = createTile(x, y, realIndex, imgSrc);
                        container.appendChild(tile);
                        tiles[realIndex] = { element: tile, x, y };
                    }
                }
            }
           
            // 애니메이션으로 섞기 시작
            shuffleAnimated(MAX_MIX_COUNT); //섞는횟수
        }
        //섞는 애니메이션
       function shuffleAnimated(moves) {
            let moveCount = 0;
            let lastBlankIndex = -1; // 이전 빈칸 위치 저장
            const directions = [
                { dx: 0, dy: -1 }, // 위
                { dx: 0, dy: 1 },  // 아래
                { dx: -1, dy: 0 }, // 왼쪽
                { dx: 1, dy: 0 }   // 오른쪽
            ];

//            const interval = setInterval(() => {
           for(var i = 0 ; i < moves;i++){
                const blankX = blankIndex % COLS;
                const blankY = Math.floor(blankIndex / COLS);

                const neighbors = [];

                directions.forEach(({ dx, dy }) => {
                    const nx = blankX + dx;
                    const ny = blankY + dy;
                    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
                        const nIndex = ny * COLS + nx;
                        if (tiles[nIndex]) {
                            if (nIndex !== lastBlankIndex) {
                                neighbors.push(nIndex);
                            }
                        }
                    }
                });

                if (neighbors.length === 0) {
                    clearInterval(interval);
                    return;
                }

                const randIdx = Math.floor(Math.random() * neighbors.length);
                const tileIndex = neighbors[randIdx];
                const tile = tiles[tileIndex];

                // 이전 빈칸 기억
                lastBlankIndex = blankIndex;

                // 위치 교환
                const tempX = tile.x;
                const tempY = tile.y;

                tile.x = blankIndex % COLS;
                tile.y = Math.floor(blankIndex / COLS);
                tile.element.style.left = `${tile.x * TILE_SIZE}px`;
                tile.element.style.top = `${tile.y * TILE_SIZE}px`;

                tiles[blankIndex] = tile;
                tiles[tileIndex] = undefined;
                blankIndex = tileIndex;

                moveCount++;
//                if (moveCount >= moves) {
//                    clearInterval(interval);
//                }
           }
//            }, 0);
        }
