<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Flexible Full Screen Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; /* 레터박스 색상 */
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            display: block;
        }

        #status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <video id="videoPlayer" autoplay muted playsinline></video>
    <div id="status">파일 스캔 중...</div>

    <script>
        /**
         * 설정 변수
         * screentype.fit = 1 (전체 채우기 - 비율무시)
         * screentype.fit = 2 (비율 맞게 꽉 채우기 - 잘림발생/Cover)
         * screentype.fit = 3 (비율 맞게 안잘리게 - 레터박스/Contain)
         */
        const screentype = {
            fit: 1 
        };

        const video = document.getElementById('videoPlayer');
        const status = document.getElementById('status');
        let playlist = [];
        let currentIndex = 0;

        // 화면 모드 설정 적용
        function applyScreenType() {
            if (screentype.fit === 3) {
                video.style.objectFit = "contain"; // 비율 유지, 안잘림, 레터박스 생성
                console.log("모드: 비율 유지 안잘리게 (contain)");
            } else if (screentype.fit === 2) {
                video.style.objectFit = "cover";   // 비율 유지, 꽉 채움, 외곽 잘림
                console.log("모드: 비율 유지 꽉 채우기 (cover)");
            } else {
                video.style.objectFit = "fill";    // 강제 전체 채우기, 비율 무시
                console.log("모드: 강제 전체 채우기 (fill)");
            }
        }

        async function scanPlaylist() {
            applyScreenType();
            status.innerText = "스캔 시작...";
            
            for (let i = 1; i <= 100; i++) {
                const url = `res/sample${i}.mp4`;
                try {
                    const response = await fetch(url, { method: 'HEAD' });
                    if (response.ok) {
                        playlist.push(url);
                        status.innerText = `발견: ${playlist.length}개`;
                    }
                } catch (e) { }
            }

            if (playlist.length > 0) {
                status.innerText = `총 ${playlist.length}개 재생 중 (Mode: ${screentype.fit})`;
                setTimeout(() => { status.style.opacity = '0'; }, 3000);
                playNext();
            } else {
                status.innerText = "재생할 파일이 없습니다 (res/ 확인)";
            }
        }

        function playNext() {
            if (currentIndex >= playlist.length) currentIndex = 0;
            video.src = playlist[currentIndex];
            video.play().catch(err => {
                status.style.opacity = '1';
                status.innerText = "클릭하면 소리가 활성화됩니다.";
            });
            currentIndex++;
        }

        video.onended = () => {
            playNext();
        };

        window.onload = scanPlaylist;

        document.body.onclick = () => {
            video.muted = false;
            status.style.opacity = '0';
        };
    </script>
</body>
</html>
