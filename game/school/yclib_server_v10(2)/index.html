        function getParam(sname) {
            var params = location.search.substr(location.search.indexOf("?") + 1);
            var sval = "";
            params = params.split("&");
            for (var i = 0; i < params.length; i++) {
                temp = params[i].split("=");
                if ([temp[0]] == sname) { sval = temp[1]; }
            }
            return sval;

            window.addEventListener('load', function () {
                var canvas = document.getElementById('gameCanvas');
                var floatingDiv = document.getElementById('div_floating');

                // 브라우저 창 크기
                var screenWidth = window.innerWidth;
                var screenHeight = window.innerHeight;

                // 원본 캔버스 크기
                var canvasWidth = 1080;
                var canvasHeight = 1920;

                // 캔버스를 화면에 맞추기 위한 비율 계산 (비율 유지)
                var scale = Math.min(screenWidth / canvasWidth, screenHeight / canvasHeight);

                // 축소된 실제 캔버스 크기
                var scaledWidth = canvasWidth * scale;
                var scaledHeight = canvasHeight * scale;

                // 화면 중앙에 캔버스가 있다고 가정할 때의 좌표 계산
                var canvasLeft = (screenWidth - scaledWidth) / 2;
                var canvasTop = (screenHeight - scaledHeight) / 2;

                // div_floating 위치 설정 (캔버스 오른쪽에 붙이기)
                floatingDiv.style.left = (canvasLeft + scaledWidth -135) + 'px'; // +10px 여유
                floatingDiv.style.top = (canvasTop + 600) + 'px'; // 예: 캔버스 위에서 100px 아래
            });
            
            document.querySelectorAll('.floating-img').forEach(img => {
                function triggerClickEffect(el) {
                    el.classList.add('clicked');
                    setTimeout(() => {
                        el.classList.remove('clicked');
                        hideFloatingPanel();
                    }, 100);
                }

                function handleEvent(e) {
                    const index = parseInt(e.currentTarget.dataset.index);
                    triggerClickEffect(e.currentTarget);
                    if (typeof C_nextScene === "function") {
                        var scene = index == 0 ? SCENE_HOME : SCENE_MENU;
                        var data = {"tab": index,
                                    "page": "main",
                                    "sub": 0
                                };                    
                        C_nextScene(scene, data);            
//                        C_nextScene(index); // Cocos2d-JS 함수 호출
                    } else {
                        console.warn("C_nextScene 함수가 정의되지 않았습니다.");
                    }
                }

                img.addEventListener('mousedown', handleEvent);
                img.addEventListener('touchstart', handleEvent);
            });
            // 오른쪽으로 사라지게 하는 함수
            function hideFloatingPanel() {
                const el = document.getElementById("div_floating");
                el.classList.remove("show-right");
                el.classList.add("hide-right");
            }

            // 다시 오른쪽에서 나타나게 하는 함수
            function showFloatingPanel() {
                const el = document.getElementById("div_floating");
                el.style.display="block";
                el.classList.remove("hide-right");
                el.classList.add("show-right");
            }
            hideFloatingPanel();
