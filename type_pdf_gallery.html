  <style>
    html, body {
        
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      left: 50%;
      top: 50%;
      transform: translate(0px, 0px) scale(1);
      transform-origin: 0 0; /* 좌상단 기준 */   
        

    }
 
      
    #toolbar {
      height: 0; /* 필요하면 높이 지정해서 사용 */
    }

    #viewerWrapper {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #viewerContainer {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;           /* ✅ 슬라이드 영역 밖은 안 보이도록 */
      background: #2c2c2c;
    }

    /* ✅ 실제로 화면에 그려지는 캔버스 2개 (더블 버퍼) */
    .pdfCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;                /* 화면 전체를 채우도록 */
      height: 100%;
      display: block;
      /* 슬라이드 애니메이션 위해 transform 사용 */
      transform: translateX(100%); /* 기본은 오른쪽 바깥에 대기 */
      will-change: transform;
    }

    /* ✅ 제스처 입력 전용 레이어 */
    #gestureLayer {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      cursor: pointer;
      z-index: 10;
    }

    #loading, #error {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      background: #2c2c2c;
      z-index: 20;
    }

      
        
          /*테이블 기본 설정 START*/
    .default-container {
        width: calc(100% - 300px);
        margin-left: 270px;
        margin-right: 20px;
        background-color: #fff;
        border-radius: 10px;
        padding: 40px;                     /* ✅ 크게 증가 */
        box-shadow: 0px 0px 5px 0px rgba(0, 0, 0, 0.05);
        margin-top: 20px;
    }

    .default-header {
        display: flex;
        justify-content: flex-start;
        margin-bottom: 40px;               /* ✅ 크게 증가 */
    }

    .default-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 20px;                   /* ✅ 기본 글자 매우 크게 */
    }

    /* ✅ 헤더 */
    .default-table th {
        background-color: #f9f9f9;
        padding: 32px 22px;                /* ✅ 위아래 매우 넉넉 */
        text-align: center;
        border-top: 1px solid #eff2f5;
        border-bottom: 1px solid #eff2f5;
        color: #181c32;
        font-weight: 800;                  /* ✅ 매우 또렷 */
        font-size: 22px;                   /* ✅ 헤더 더 크게 */
    }

    /* ✅ 바디 */
    .default-table td {
        padding: 28px 22px;                /* ✅ 행 높이 최고치 */
        text-align: center;
        border-bottom: 1px solid #eff2f5;
        color: #7e8299;
        font-size: 20px;                   /* ✅ 본문 더 큼 */
    }

    /* 클릭/호버 효과 */
    .default-table td[onclick] {
        transition: background-color 0.2s;
    }

    .default-table td[onclick]:hover {
        background-color: #eef6ff;
    }

    .default-table tbody tr {
        transition: all 0.2s ease;
    }

    .default-table tbody tr:hover {
        background-color: #eef6ff;
    }

    .default-table tbody tr:hover td {
        color: #181c32;
    }

    .default-table tbody tr td {
        transition: all 0.2s ease;
    }

    .default-table tbody tr td:nth-child(5) {
        cursor: pointer;
    }

    .default-table tbody tr td:first-child {
        background-color: transparent;
    }
      
      /* ✅ DataTables 검색 전체 영역 */
    .dataTables_filter {
        font-size: 22px !important;          /* ✅ 검색영역 글자 자체 크게 */
        font-weight: 700;
        color: #181c32;
        margin-right: 30px;                 /* ✅ 테이블과 간격 크게 */
        margin-bottom: 30px; 
    }

    /* ✅ "Search:" 라벨 텍스트 */
    .dataTables_filter label {
        font-size: 22px !important;          /* ✅ 라벨도 같이 크게 */
        font-weight: 700;
        color: #181c32;
    }

    /* ✅ 실제 입력창 */
    .dataTables_filter input {
        font-size: 22px !important;          /* ✅ 입력 글자 엄청 크게 */
        height: 60px;                        /* ✅ 입력창 높이 */
        padding: 10px 18px;
        margin-left: 15px;
        border-radius: 10px;
        border: 2px solid #adb5bd;
        outline: none;
        box-sizing: border-box;
        transition: all 0.2s ease;
    }

    /* ✅ 포커스 시 가시성 강화 */
    .dataTables_filter input:focus {
        border-color: #4dabf7;
        box-shadow: 0 0 0 4px rgba(77, 171, 247, 0.25);

    #error { display: none; }

    function onchangeSearchDate(){
        var input_search_startdate = document.getElementById("input_search_startdate");
        var input_search_enddate   = document.getElementById("input_search_enddate");
       saveData("input_search_startdate", input_search_startdate.value);
        saveData("input_search_enddate", input_search_enddate.value);
        if (input_search_startdate.value && input_search_enddate.value && new Date(input_search_enddate.value) >= new Date(input_search_startdate.value)) {

            var searchdate_pdflist = [];

            // ✅ 검색 기간
            var searchStart = new Date(input_search_startdate.value+" 00:00:00");
            var searchEnd   = new Date(input_search_enddate.value+" 23:59:59");

            for (var i = 0; i < default_pdflist.length; i++) {

                var startdate = default_pdflist[i].pdf_startdate.substr(0,10)+" 00:00:00";
                var enddate   = default_pdflist[i].pdf_enddate.substr(0,10)+" 23:59:59";

                console.log(i+" ")
                if (startdate && enddate) {

                    var itemStart = new Date(startdate);
                    var itemEnd   = new Date(enddate);

                    // ✅ 핵심: 단 1일이라도 겹치면 포함
                    if (itemStart <= searchEnd && itemEnd >= searchStart) {
                        searchdate_pdflist.push(default_pdflist[i]);
                    }
                }
            }
            pdflist = searchdate_pdflist;
            setDiv("list0");
            showPdfListView();
            

        }
        else {
            pdflist = [];
            setDiv("list0");
            showPdfListView();
        }
    }

    function setDiv(_type) {
        var iframeHeight = window.innerHeight + "px"; // ✅ iframe 실제 높이

        if(_type != "list0"){
            div_pdf.style.display = "block";
            div_list.style.display = "none";

            div_pdf.style.height = iframeHeight;

            pagetype = _type;
        }
        else {
            div_pdf.style.display = "none";
            div_list.style.display = "block";

            div_list.style.height = iframeHeight;

            pagetype = _type;
        } 
    }
   //pdf_manageid 기준으로 그룹핑하는 기본 함수
    function groupRowsByCompanyId(rows) {
        var grouped = {};

        if (!Array.isArray(rows)) return grouped;

        for (var i = 0; i < rows.length; i++) {
            var key = rows[i]["pdf_companyid"];

            if (!grouped[key]) {
                grouped[key] = [];
            }

            grouped[key].push(rows[i]);
        }

        return grouped;
    }

    //그룹핑된 데이터를 다시 “배열 형태”로 쓰고 싶을 때
    function groupRowsByManageIdToArray(rows) {
        var map = groupRowsByCompanyId(rows);
        var result = [];

        for (var key in map) {
            result.push({
                pdf_companyid: key,
                items: map[key]
            });
        }

        return result;
    }
    function showPdfListView(){
        if(pdfcategory == "home_btn11"){

            makeTable('dataTable',groupArray,true);
        }else{
            makeTable('dataTable',pdflist,false);
        }
    }

    // ======================================
    // ✅ 전역 상태
    // ======================================
    var pdfDoc = null;
    var currentPage = 1;
    var totalPages = 0;
    var autoPlayInterval = 5000; // 5초
    var autoPlayTimer = null;

    var canvasA = document.getElementById("pdfCanvasA");
    var canvasB = document.getElementById("pdfCanvasB");
    var gestureLayer = document.getElementById("gestureLayer");
    var loadingEl = document.getElementById("loading");
    var errorEl = document.getElementById("error");
    var viewerContainer = document.getElementById("viewerContainer");

    // 현재 화면에 보이는 캔버스가 A인지 B인지
    var isShowingA = true;
    var isAnimating = false;

    // 🖐 제스처용 상태
    var isPointerDown = false;
    var startX = 0;
    var currentX = 0;
    var dragThreshold = 50; // px 이상 움직이면 페이지 넘김

    // ======================================
    // 공통: 특정 캔버스에 한 페이지를 렌더 (애니메이션 없음)
    // ======================================
    function renderPageToCanvas(pageNum, targetCanvas) {
      return new Promise(function(resolve, reject) {
        if (!pdfDoc) {
          reject("pdfDoc 없음");
          return;
        }

        loadingEl.style.display = "flex";
        errorEl.style.display = "none";

        pdfDoc.getPage(pageNum).then(function(page) {
          var containerWidth  = viewerContainer.clientWidth  || window.innerWidth;
          var containerHeight = viewerContainer.clientHeight || window.innerHeight;

          // 화면 기준 스케일 계산
          var viewport = page.getViewport({ scale: 1 });
          var scale = Math.min(
            containerWidth  / viewport.width,
            containerHeight / viewport.height
          );
          var scaledViewport = page.getViewport({ scale: scale });

          // 타깃 캔버스를 화면 크기로 맞춤
          targetCanvas.width  = containerWidth;
          targetCanvas.height = containerHeight;
          var tctx = targetCanvas.getContext("2d");

          // PDF 페이지는 내부 임시 캔버스에 그림
          var tempCanvas = document.createElement("canvas");
          tempCanvas.width  = scaledViewport.width;
          tempCanvas.height = scaledViewport.height;
          var tempCtx = tempCanvas.getContext("2d");

          var renderContext = {
            canvasContext: tempCtx,
            viewport: scaledViewport
          };

          return page.render(renderContext).promise.then(function() {
            // 가운데 정렬해서 화면 캔버스에 복사
            tctx.clearRect(0, 0, containerWidth, containerHeight);
            var offsetX = (containerWidth  - scaledViewport.width)  / 2;
            //var offsetY = (containerHeight - scaledViewport.height) / 2;//가운데정렬
            var offsetY = 0;
            tctx.drawImage(tempCanvas, offsetX, offsetY);
            loadingEl.style.display = "none";
            resolve();
          });
        }).catch(function(err) {
          console.error("페이지 렌더 실패:", err);
          loadingEl.style.display = "none";
          errorEl.style.display = "flex";
          errorEl.textContent = txt_json[languagecode].error_fail_page_render;
          reject(err);
        });
      });
    }

    // ======================================
    // 🎞 슬라이드 애니메이션
    // direction: "next" | "prev"
    // ======================================
    function slideToPage(newPageNum, direction) {
      if (!pdfDoc) return;
      if (newPageNum < 1 || newPageNum > totalPages) return;
      if (isAnimating) return;

      isAnimating = true;

      var currentCanvas = isShowingA ? canvasA : canvasB;
      var nextCanvas    = isShowingA ? canvasB : canvasA;

      // 슬라이드 방향 설정
      var fromOffset = 0;
      var toOffsetCurrent, fromOffsetNext, toOffsetNext;

      if (direction === "next") {
        // 현재: 0% -> -100%, 다음: +100% -> 0%
        toOffsetCurrent = -100;
        fromOffsetNext  = 100;
        toOffsetNext    = 0;
      } else {
        // prev: 현재: 0% -> +100%, 다음: -100% -> 0%
        toOffsetCurrent = 100;
        fromOffsetNext  = -100;
        toOffsetNext    = 0;
      }

      // 먼저 다음 페이지 캔버스를 렌더
      renderPageToCanvas(newPageNum, nextCanvas).then(function() {
        // 초기 위치 설정 (transition 없이 배치)
        currentCanvas.style.transition = "none";
        nextCanvas.style.transition    = "none";

        currentCanvas.style.transform  = "translateX(" + fromOffset + "%)";
        nextCanvas.style.transform     = "translateX(" + fromOffsetNext + "%)";

        // reflow 강제
        void nextCanvas.offsetWidth;

        // 이제 애니메이션 시작
        currentCanvas.style.transition = "transform 0.4s ease-out";
        nextCanvas.style.transition    = "transform 0.4s ease-out";

        currentCanvas.style.transform  = "translateX(" + toOffsetCurrent + "%)";
        nextCanvas.style.transform     = "translateX(" + toOffsetNext    + "%)";

        // 애니메이션 끝나면 상태 정리
        var onTransitionEnd = function(e) {
          if (e.target !== nextCanvas) return;

          nextCanvas.removeEventListener("transitionend", onTransitionEnd);
          isShowingA = !isShowingA;
          currentPage = newPageNum;
          isAnimating = false;
        };

        nextCanvas.addEventListener("transitionend", onTransitionEnd);
      }).catch(function() {
        isAnimating = false;
      });
    }

    // ======================================
    // 페이지 이동 관련 함수
    // ======================================
    function goToPage(pageNum) {
      if (!pdfDoc) return;
      if (pageNum < 1 || pageNum > totalPages) return;

      var targetCanvas = isShowingA ? canvasA : canvasB;
      renderPageToCanvas(pageNum, targetCanvas).then(function() {
        // 정적 렌더: 현재 캔버스는 0%, 다른 캔버스는 화면 밖으로
        var otherCanvas = isShowingA ? canvasB : canvasA;

        targetCanvas.style.transition = "none";
        otherCanvas.style.transition  = "none";

        targetCanvas.style.transform  = "translateX(0%)";
        otherCanvas.style.transform   = "translateX(100%)";

        currentPage = pageNum;
      });
    }

    function nextPage() {
      if (!pdfDoc) return;
      var next = currentPage + 1;
      if (next > totalPages) next = 1;
      slideToPage(next, "next");
    }

    function prevPage() {
      if (!pdfDoc) return;
      var prev = currentPage - 1;
      if (prev < 1) prev = totalPages;
      slideToPage(prev, "prev");
    }

    // ======================================
    // 자동 페이지 넘김 (5초 간격)
    // ======================================
    function startAutoPlay() {
      stopAutoPlay();
      autoPlayTimer = setInterval(function () {
        nextPage();
      }, autoPlayInterval);
    }

    function stopAutoPlay() {
      if (autoPlayTimer) {
        clearInterval(autoPlayTimer);
        autoPlayTimer = null;
      }
    }

    // ======================================
    // 메인: PDF 로드 + 첫 페이지 렌더 + 자동재생
    // ======================================
    function showPdf(pdfPath) {
      if (!pdfPath) {
        loadingEl.style.display = "none";
        errorEl.style.display = "flex";
        errorEl.textContent = txt_json[languagecode].error_no_path_parameter
        return;
      }

      loadingEl.style.display = "flex";
      errorEl.style.display = "none";

      var loadingTask = pdfjsLib.getDocument({ url: pdfPath });
      loadingTask.promise.then(function (pdf) {
        pdfDoc = pdf;
        totalPages = pdf.numPages;
        currentPage = 1;

        // 첫 페이지는 A 캔버스에 정적으로 렌더
        isShowingA = true;
        canvasA.style.transform = "translateX(0%)";
        canvasB.style.transform = "translateX(100%)";

        return renderPageToCanvas(currentPage, canvasA);
      }).then(function() {
//        startAutoPlay();
      }).catch(function (reason) {
        console.error("PDF 로딩 실패:", reason);
        loadingEl.style.display = "none";
        errorEl.style.display = "flex";
        errorEl.textContent = txt_json[languagecode].error_pdf_load;
      });
    }

    // ======================================
    // 🖐 터치 + 마우스 제스처 처리 (스와이프)
    // ======================================
    function onPointerDown(clientX) {
      isPointerDown = true;
      startX = clientX;
      currentX = clientX;
      stopAutoPlay(); // 사용자가 손대면 자동재생 잠시 멈춤
    }

    function onPointerMove(clientX) {
      if (!isPointerDown) return;
      currentX = clientX;
    }

    function onPointerUp() {
      if (!isPointerDown) return;
      var deltaX = currentX - startX;

      if (Math.abs(deltaX) > dragThreshold) {
        if (deltaX < 0) {
          // 왼쪽으로 드래그 → 다음 페이지
          nextPage();
        } else {
          // 오른쪽으로 드래그 → 이전 페이지
          prevPage();
        }
      }

      isPointerDown = false;
//      startAutoPlay();
    }

    // ✅ 제스처는 gestureLayer 에서만 처리
gestureLayer.addEventListener("touchstart", function (e) {
  if (e.touches.length === 1 && !isPinching) {
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;

    if (zoomScale === 1) {
      // 🔹 페이지 슬라이드 모드
      onPointerDown(x);
    } else if (zoomScale > 1) {
      // 🔹 확대된 상태 → 드래그 시작
      startPan(x, y);
    }
  }
}, { passive: true });

gestureLayer.addEventListener("touchmove", function (e) {
  if (e.touches.length === 1 && !isPinching) {
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;

    if (zoomScale === 1) {
      onPointerMove(x);
    } else if (zoomScale > 1) {
      movePan(x, y);
    }
  }
}, { passive: true });

gestureLayer.addEventListener("touchend", function () {
  if (!isPinching) {
    if (zoomScale === 1) {
      onPointerUp();
    } else if (zoomScale > 1) {
      endPan();
    }
  }
});

// =======================
// 마우스 (PC) 용도도 동일 분기
// =======================
gestureLayer.addEventListener("mousedown", function (e) {
  if (isPinching) return;
  const x = e.clientX;
  const y = e.clientY;

  if (zoomScale === 1) {
    onPointerDown(x);
  } else if (zoomScale > 1) {
    startPan(x, y);
  }
});

gestureLayer.addEventListener("mousemove", function (e) {
  if (isPinching) return;
  const x = e.clientX;
  const y = e.clientY;

  if (zoomScale === 1) {
    onPointerMove(x);
  } else if (zoomScale > 1) {
    movePan(x, y);
  }
});

gestureLayer.addEventListener("mouseup", function () {
  if (isPinching) return;

  if (zoomScale === 1) {
    onPointerUp();
  } else if (zoomScale > 1) {
    endPan();
  }
});

gestureLayer.addEventListener("mouseleave", function () {
  if (isPinching) return;

  if (zoomScale === 1) {
    if (isPointerDown) onPointerUp();
  } else if (zoomScale > 1) {
    endPan();
  }
});

        var targetCanvas = isShowingA ? canvasA : canvasB;
        renderPageToCanvas(currentPage, targetCanvas);
      }
    });
      
      document.addEventListener("click", () => {
          window.parent.postMessage({
              type: "iframe_clicked",
              value: ""+pagetype

        window.addEventListener("scroll", () => {

     function startPan(clientX, clientY) {
      isPanning = true;
      panStartX = clientX;
      panStartY = clientY;
    }

    function movePan(clientX, clientY) {
      if (!isPanning) return;

      const dx = clientX - panStartX;
      const dy = clientY - panStartY;

      // 현재 이동 = 누적 오프셋 + 이번 드래그 delta
      currentPanX = panOffsetX + dx;
      currentPanY = panOffsetY + dy;

      applyTransformMove(); 
    }

    function endPan() {
      if (!isPanning) return;
      isPanning = false;

      // 드래그 끝난 위치를 누적 오프셋으로 저장
      panOffsetX = currentPanX;
      panOffsetY = currentPanY;
    } 
      
      
      
      
      
      
      
      
       // 줌 관련 상태
    let zoomScale = 1;
    const minZoom = 1;
    const maxZoom = 4;

    let isPinching = false;
    let pinchStartDist = 0;
    let pinchStartScale = 1;

    var touch0 = null;
    var touch1 = null;
    var pinchCenter = { x: 0, y: 0 }; // 확대 축소 기준점
      
    function clampZoom(v) {
      if (v < minZoom) return minZoom;
      if (v > maxZoom) return maxZoom;
      return v;
    }

    function getTouchDistance(t1, t2) {
      const dx = t2.clientX - t1.clientX;
      const dy = t2.clientY - t1.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

//    function applyTransform() {

//        target.style.marginTop = marginTop + "px";

    function applyTransform() { //되는거
        if (!target) return;

        const scale = zoomScale;

        // 손가락 중심 기준으로 확대될 때 이동해야 하는 보정값
        const offsetX = pinchCenter.x * (1 - scale);
        const offsetY = pinchCenter.y * (1 - scale);
        console.log("offsetX "+offsetX+" offsetY "+offsetY);
        target.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }
    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;
    let panOffsetX = 0;   // 누적 이동값
    let panOffsetY = 0;
    let currentPanX = 0;
    let currentPanY = 0;
    function applyTransformMove() {
      console.log("applyTransform zoomScale " + zoomScale);
      console.log("applyTransform target ", target);

      const baseW = window_width;    // 기본 폭 (예: 1080)
      const baseH = window_height;   // 기본 높이 (예: 1680)

      const body_width  = baseW * zoomScale;
      const body_height = baseH * zoomScale;

      console.log("body_width " + body_width + " body_height " + body_height);

      // 🔹 이동 가능한 최소/최대 값 계산
      // transform-origin: 0 0 기준 → 
      // 왼쪽/위로는 최대 (0,0), 오른쪽/아래로는 (뷰 크기 - 확대된 크기)
      const minX = baseW - body_width;   // 가장 오른쪽으로 끌었을 때
      const maxX = 0;                    // 가장 왼쪽 (원점)
      const minY = baseH - body_height;
      const maxY = 0;

      // 🔹 currentPanX/Y 를 이 범위 안으로 클램프
      let tx = currentPanX;
      let ty = currentPanY;

      tx = Math.max(minX, Math.min(maxX, tx));
      ty = Math.max(minY, Math.min(maxY, ty));

      // 클램프된 값을 다시 상태에도 반영 (끝까지 끌어도 더 안 나가게)
      currentPanX = tx;
      currentPanY = ty;

        pinchCenter.x = currentPanX;
        pinchCenter.y = currentPanY;
        
      // 🔥 이동 + 확대 동시에 적용
      target.style.transform = `translate(${tx}px, ${ty}px) scale(${zoomScale})`;
    }

    // 터치 시작
    window.addEventListener("touchstart", function (e) {
      if (e.touches.length === 2) {
        // 핀치 시작
        isPinching = true;
        pinchStartDist = getTouchDistance(e.touches[0], e.touches[1]);
        pinchStartScale = zoomScale;
          touch0 = e.touches[0];
          touch1 = e.touches[1];
          // 두 손가락의 중앙점
        pinchCenter.x = (touch0.clientX + touch1.clientX) / 2;
        pinchCenter.y = (touch0.clientY + touch1.clientY) / 2;
      }
    }, { passive: false });

    // 터치 이동
    window.addEventListener("touchmove", function (e) {
      if (isPinching && e.touches.length === 2) {
        e.preventDefault(); // 브라우저 기본 제스처 막기

        const newDist = getTouchDistance(e.touches[0], e.touches[1]);
        if (pinchStartDist > 0) {
          const rawScale = pinchStartScale * (newDist / pinchStartDist);
          zoomScale = clampZoom(rawScale);
          applyTransform();
        }
      }
    }, { passive: false });

    // 터치 종료
    window.addEventListener("touchend", function (e) {
      if (isPinching && e.touches.length < 2) {
        isPinching = false;
      }
    });

    window.addEventListener("touchcancel", function () {
      isPinching = false;
    });
